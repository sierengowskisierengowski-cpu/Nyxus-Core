# NYXUS · SDDM defaults — restored by `nyxus-loginscreen reset`.
# Mirrors what we ship in /etc/sddm.conf.d/nyxus.conf so a Settings reset
# returns to a known-good state instead of leaving an empty file.
[Theme]
Current=nyxus
CursorTheme=Adwaita
Font=Inter

[Autologin]
User=
Session=hyprland.desktop
Relogin=false

[General]
DefaultPath=/usr/local/sbin:/usr/local/bin:/usr/bin
RememberLastUser=true
RememberLastSession=true
Numlock=none
