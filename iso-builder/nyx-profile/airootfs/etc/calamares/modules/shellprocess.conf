#
# Runs INSIDE the new root after unpackfs has copied the live airootfs
# to the target disk. Used to scrub live-only artifacts that must NOT
# leak to the installed system.
#
# Schema: https://github.com/calamares/calamares/blob/calamares/src/modules/shellprocess/shellprocess.conf

dontChroot: false
timeout: 30

script:
  # ── Remove live-only passwordless sudo drop-in ───────────────────────
  # The live ISO ships /etc/sudoers.d/10-nyxus-live granting NOPASSWD
  # to the `nyx` user so live evaluation/recovery is friction-free.
  # The INSTALLED system MUST revert to standard wheel + password sudo,
  # so we delete the drop-in here. Leaving it would be a security
  # regression (any local user named `nyx` would have passwordless root).
  - command: "rm -f /etc/sudoers.d/10-nyxus-live"
    timeout: 10
  # ── Sanity: re-validate sudoers so a broken drop-in can't brick sudo ─
  - command: "visudo -c"
    timeout: 10
