---
# NYXUS · calamares installer sequence · rev 2026-05-13 r2
#
# Interactive modules go in `show` (UI pages the user clicks through).
# Non-interactive ones go in `exec` (run silently after the user hits
# "Install"). The standard Calamares convention is:
#
#   show  : welcome → locale → keyboard → partition → users → summary
#   exec  : partition (apply) → mount → unpackfs → ... → bootloader → umount
#   show  : finished
#
# The `partition` and `users` modules implement BOTH a UI page (in show)
# AND an exec step (in exec); Calamares dispatches based on context.
#
modules-search: [local, /usr/lib/calamares/modules]
sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - users
      - displaymanager
      - networkcfg
      - hwclock
      - services-systemd
      - grubcfg
      - bootloader
      - packages
      - shellprocess
      - umount
  - show:
      - finished
branding: nyxus
prompt-install: true
dont-chroot: false
