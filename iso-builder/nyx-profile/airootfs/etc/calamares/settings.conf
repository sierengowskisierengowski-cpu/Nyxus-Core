# NYXUS · Calamares installer settings (DARK MIRROR rev 2026-05)
# Standard online-Arch flow with NYXUS branding.
---
modules-search: [ local, /usr/lib/calamares/modules ]

# No custom shellprocess instances yet. When we want to drop a NYXUS-
# specific post-install hook, add it here AND ship the matching config
# under /etc/calamares/modules/. The verifier (§9) confirms every
# referenced shellprocess config exists.

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - services-systemd
  - grubcfg
  - bootloader
  # NYXUS post-install hook (rev 2026-05-13). MUST run AFTER unpackfs
  # (so the target /etc exists) and BEFORE umount (so we're still in
  # chroot context). Removes the live-only /etc/sudoers.d/10-nyxus-live
  # drop-in so the installed system reverts to standard wheel sudo.
  - shellprocess
  - umount
- show:
  - finished

branding: nyxus
prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
quit-at-end: false
