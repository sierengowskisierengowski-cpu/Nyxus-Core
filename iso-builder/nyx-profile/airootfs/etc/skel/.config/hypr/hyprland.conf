# ════════════════════════════════════════════════════════════════════════════
# NYXUS · Hyprland config (ISO first-boot edition · rev 2026-05-10 r2)
# ════════════════════════════════════════════════════════════════════════════
# This is the SAME config as the daily-driver
# (artifacts/api-server/nyxus-scripts/hyprland.conf), with one addition:
# nyxus-bootstrap runs first to populate ~/.config/hypr/conf.d/, ~/.nyxus/,
# wallpapers, and the rest of the runtime tree before the rest of autostart
# touches anything.
#
# Rule for editing: change the daily-driver first, then mirror here. The
# two files MUST stay in sync or ISO first-boot will diverge from a
# resynced install.
#
# © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ════════════════════════════════════════════════════════════════════════════

monitor=,preferred,auto,1

# ── Autostart ────────────────────────────────────────────────────────────────
# Bootstrap runs FIRST and IDEMPOTENTLY — downloads/refreshes every NYXUS
# script, conf.d shard, wallpaper, and waybar/rofi/dunst/wlogout theme.
# Subsequent boots are ~no-ops when files already exist + match.
exec-once = /usr/local/bin/nyxus-bootstrap > /tmp/nyxus-bootstrap.log 2>&1

exec-once = waybar --config ~/.config/waybar/config --style ~/.config/waybar/style.css
exec-once = hypridle
exec-once = dunst
exec-once = swaybg -i ~/.config/hypr/walls/nyxus-starfield-wall.png -m fill -c "#000000"
exec-once = lxpolkit
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ISO-only QoL daemons (network applet + clipboard history watchers)
exec-once = nm-applet --indicator
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── NYXUS Native GTK4 Apps — launch at startup ───────────────────────────────
# NYXUS Home — dashboard on named workspace "0" (its own page, outside the
# numbered 1-10 range so every numbered slot stays free).
exec-once = [workspace name:0 silent] sh -c 'sleep 1 && ~/.local/bin/nyxus-home'
windowrule = workspace name:0 silent,  class:^io\.nyxus\.home$
windowrule = workspace name:0 silent,  title:^NYXUS Home$

# ── NYXUS Floating Widgets — uncomment to pin to desktop ─────────────────────
# exec-once = /usr/local/bin/nyxus-weather &
# exec-once = python3 ~/.nyxus/nyxus_stickies.py &
# exec-once = /usr/local/bin/nyxus-notepad &

# ── Environment ──────────────────────────────────────────────────────────────
env = GTK_THEME,NYXUS
env = XCURSOR_SIZE,24
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland

# ── Input ────────────────────────────────────────────────────────────────────
input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll       = true
        disable_while_typing = true
        tap-to-click         = true
    }
}

# ── General ──────────────────────────────────────────────────────────────────
general {
    gaps_in     = 6
    gaps_out    = 14
    border_size = 3

    # NYXUS DARK MIRROR active glow (locked rev 2026-05-07 r13)
    col.active_border   = rgba(ffffffff) rgba(e8edf5ee) rgba(c8ccd6cc) rgba(0a0a0a99) rgba(000000ff) 135deg
    col.inactive_border = rgba(e8edf522) rgba(c8ccd611) rgba(00000044) 135deg

    layout           = dwindle
    resize_on_border = true
}

# ── Decoration ───────────────────────────────────────────────────────────────
decoration {
    rounding = 12

    active_opacity   = 0.96
    inactive_opacity = 0.85

    blur {
        enabled           = true
        size              = 14
        passes            = 4
        new_optimizations = true
        xray              = true
        noise             = 0.015
        contrast          = 1.05
        brightness        = 0.92
        vibrancy          = 0.30
        vibrancy_darkness = 0.10
        popups            = true
        popups_ignorealpha = 0.20
        ignore_opacity    = true
    }

    shadow {
        enabled        = true
        range          = 36
        render_power   = 3
        sharp          = false
        color          = rgba(000000aa)
        color_inactive = rgba(00000033)
        offset         = 2 4
    }
}

# ── Animations (spring-approximating beziers, hyprlang has no native springs) ─
animations {
    enabled = true

    bezier = nyx-spring, 0.34, 1.36, 0.64, 1.0
    bezier = nyx-glass,  0.16, 1.0,  0.2,  1.0
    bezier = nyxus,      0.05, 0.9,  0.1,  1.05
    bezier = nyx-out,    0.4,  0.0,  1.0,  1.0
    bezier = overshoot,  0.1,  0.85, 0.1,  1.18
    bezier = nyx-soft,   0.25, 0.46, 0.45, 0.94
    bezier = nyx-sharp,  0.16, 1.0,  0.3,  1.0
    bezier = linear,     0.0,  0.0,  1.0,  1.0

    animation = windows,          1, 4,  nyx-glass,  slide
    animation = windowsIn,        1, 5,  nyx-spring, popin 92%
    animation = windowsOut,       1, 3,  nyx-out,    popin 60%
    animation = windowsMove,      1, 4,  nyx-glass,  slide
    animation = border,           1, 10, default
    animation = borderangle,      1, 240, linear, loop
    animation = fade,             1, 5,  nyx-out
    animation = fadeIn,           1, 4,  nyx-glass
    animation = fadeOut,          1, 3,  nyx-out
    animation = workspaces,       1, 5,  nyx-spring, slidefade 15%
    animation = specialWorkspace, 1, 5,  nyx-glass,  slidevert
}

# ── Layout ───────────────────────────────────────────────────────────────────
dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
}

# ── Misc ─────────────────────────────────────────────────────────────────────
misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    vfr                      = true
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
    focus_on_activate        = true
}


# ─────────────────────────────────────────────────────────────────────────────
# KEY BINDINGS
# ─────────────────────────────────────────────────────────────────────────────
$mod = SUPER

# ── Apps ─────────────────────────────────────────────────────────────────────
bind = $mod,       Return,      exec, python3 ~/.nyxus/nyxus_terminal.py
bind = $mod SHIFT, Return,      exec, alacritty
bind = $mod,       D,       exec, rofi -show drun -theme ~/.config/rofi/startmenu.rasi
bind = $mod SHIFT, D,       exec, rofi -show run
bind = $mod,       Tab,     exec, rofi -show window -theme ~/.config/rofi/nyxus.rasi
bind = $mod,       E,       exec, nautilus
bind = $mod,       B,       exec, firefox

# ── Lock / logout ─────────────────────────────────────────────────────────────
bind = $mod,       L,       exec, hyprlock
bind = $mod SHIFT, E,       exec, wlogout --protocol layer-shell --layout ~/.config/wlogout/layout --css ~/.config/wlogout/style.css -b 3 -c 0 -r 0 -L 0
bind = $mod SHIFT, M,       exit

# ── Window management ────────────────────────────────────────────────────────
bind = $mod,       Q,       killactive
bind = $mod,       V,       togglefloating
bind = $mod,       P,       pseudo
bind = $mod,       T,       togglesplit
bind = $mod,       F,       fullscreen, 0
bind = $mod SHIFT, F,       fullscreen, 1
bind = $mod SHIFT, C,       centerwindow

# ── NYXUS Phase 2 — launcher / powermenu / screenshot / doctor ───────────────
bind = $mod,       Space,   exec, python3 ~/.nyxus/nyxus_launcher.py
bind = $mod,       Escape,  exec, python3 ~/.nyxus/nyxus_powermenu.py
bind = ,           Print,   exec, python3 ~/.nyxus/nyxus_screenshot.py region
bind = SHIFT,      Print,   exec, python3 ~/.nyxus/nyxus_screenshot.py
bind = $mod SHIFT, H,       exec, alacritty -e python3 ~/.nyxus/nyxus_doctor.py

# ── Focus (arrow keys + WASD-style) ──────────────────────────────────────────
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H,     movefocus, l
bind = $mod, K,     movefocus, u
bind = $mod, semicolon, movefocus, r

# ── Move windows ─────────────────────────────────────────────────────────────
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# ── Resize ───────────────────────────────────────────────────────────────────
bind = $mod CTRL, left,  resizeactive, -40  0
bind = $mod CTRL, right, resizeactive,  40  0
bind = $mod CTRL, up,    resizeactive,   0 -40
bind = $mod CTRL, down,  resizeactive,   0  40

# ── Workspaces ───────────────────────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# ── Scratchpad ────────────────────────────────────────────────────────────────
bind = $mod,       S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace,        special:magic

# ── Mouse ────────────────────────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Media / Volume ───────────────────────────────────────────────────────────
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,        exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute,     exec, wpctl set-mute   @DEFAULT_AUDIO_SOURCE@ toggle
bind = , XF86AudioPlay,        exec, playerctl play-pause
bind = , XF86AudioNext,        exec, playerctl next
bind = , XF86AudioPrev,        exec, playerctl previous

# ── Brightness ───────────────────────────────────────────────────────────────
bind = , XF86MonBrightnessUp,   exec, brightnessctl set 10%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# ── Screenshot ───────────────────────────────────────────────────────────────
bind = ,       Print,    exec, hyprshot -m output
bind = $mod,   Print,    exec, hyprshot -m region
bind = $mod SHIFT, W,    exec, hyprshot -m region

# ── Wallpaper reload ──────────────────────────────────────────────────────────
bind = $mod ALT, W, exec, pkill swaybg; swaybg -i ~/.config/hypr/walls/nyxus-starfield-wall.png -m fill -c "#000000" &

# ── NYXUS SysMon GTK4 ────────────────────────────────────────────────────────
windowrule = float,             class:^io\.nyxus\.sysmon$
windowrule = size 1280 800,     class:^io\.nyxus\.sysmon$
windowrule = center,            class:^io\.nyxus\.sysmon$
windowrule = bordersize 1,      class:^io\.nyxus\.sysmon$

# ── NYXUS Control GTK4 — Hardware Control Center ────────────────────────────
windowrule = float,             class:^io\.nyxus\.control$
windowrule = size 1280 800,     class:^io\.nyxus\.control$
windowrule = center,            class:^io\.nyxus\.control$
windowrule = bordersize 1,      class:^io\.nyxus\.control$

# ── NYXUS Notepad GTK4 ────────────────────────────────────────────────────────
windowrule = float,             class:^io\.nyxus\.notepad$
windowrule = size 760 540,      class:^io\.nyxus\.notepad$
windowrule = center,            class:^io\.nyxus\.notepad$

# ── NYXUS Stickies GTK4 ───────────────────────────────────────────────────────
windowrule = float,             class:^io\.nyxus\.stickies$
windowrule = size 1280 800,     class:^io\.nyxus\.stickies$
windowrule = center,            class:^io\.nyxus\.stickies$
windowrule = bordersize 1,      class:^io\.nyxus\.stickies$

# ── NYXUS Weather GTK4 ────────────────────────────────────────────────────────
windowrule = float,             class:^io\.nyxus\.weather$
windowrule = size 380 560,      class:^io\.nyxus\.weather$
windowrule = pin,               class:^io\.nyxus\.weather$
windowrule = move 20 100,       class:^io\.nyxus\.weather$

# ── NYXUS Terminal GTK4 ───────────────────────────────────────────────────────
windowrule = float,             class:^io\.nyxus\.terminal$
windowrule = size 1280 800,     class:^io\.nyxus\.terminal$
windowrule = center,            class:^io\.nyxus\.terminal$
windowrule = bordersize 1,      class:^io\.nyxus\.terminal$

# ── NYXUS Settings GTK4 ───────────────────────────────────────────────────────
windowrule = float,             class:^io\.nyxus\.settings$
windowrule = size 1280 800,     class:^io\.nyxus\.settings$
windowrule = center,            class:^io\.nyxus\.settings$
windowrule = bordersize 1,      class:^io\.nyxus\.settings$


# ── Layer blur (Dual-Kawase) ──────────────────────────────────────────────────
layerrule = blur,  namespace:^waybar$
layerrule = blur,  namespace:^rofi$
layerrule = blur,  namespace:^notifications$
layerrule = blur,  namespace:^wlogout$

# ─────────────────────────────────────────────────────────────────────────────
# NYXUS modular configs (DARK MIRROR rev 2026-05-07 r14)
# Six conf.d shards, populated by nyxus-bootstrap on first login.
# ─────────────────────────────────────────────────────────────────────────────
source = ~/.config/hypr/conf.d/nyxus-hyprland-general.conf
source = ~/.config/hypr/conf.d/nyxus-hyprland-rules.conf
source = ~/.config/hypr/conf.d/nyxus-hyprland-opacity.conf
source = ~/.config/hypr/conf.d/nyxus-hyprland-blur.conf
source = ~/.config/hypr/conf.d/nyxus-hyprland-layerblur.conf
source = ~/.config/hypr/conf.d/nyxus-hyprland-fog.conf
