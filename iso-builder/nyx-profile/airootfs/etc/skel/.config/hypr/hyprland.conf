# ════════════════════════════════════════════════════════════════════════════
# NYXUS · Hyprland base config (placeholder — locked rev 2026-05-07 r13)
# Drop your daily-driver config in over this if you want, but keep the
# `source =` lines and the `exec-once` autostart block intact, or the
# DARK MIRROR look + bootstrap will not run on first boot.
# ════════════════════════════════════════════════════════════════════════════

# ── Monitors (override per machine) ────────────────────────────────────────
monitor = , preferred, auto, 1

# ── Input ──────────────────────────────────────────────────────────────────
input {
    kb_layout       = us
    follow_mouse    = 1
    touchpad {
        natural_scroll = true
        tap-to-click   = true
        disable_while_typing = true
    }
    sensitivity     = 0
}

# ── Layout (dwindle, gentle gaps) ──────────────────────────────────────────
dwindle {
    pseudotile        = true
    preserve_split    = true
}

# ── DARK MIRROR · centrally-managed visual chrome (DO NOT EDIT INLINE) ────
# These files are pulled by nyxus_install.sh / nyxus-resync-all.sh
# and define the entire DARK MIRROR look (border, blur, opacity, rules).
# All chrome confs now live in conf.d/ — DO NOT use the legacy non-conf.d
# paths or Hyprland will throw "globbing error: found no match" on boot.
source = ~/.config/hypr/conf.d/nyxus-hyprland-general.conf
source = ~/.config/hypr/conf.d/nyxus-hyprland-blur.conf
source = ~/.config/hypr/conf.d/nyxus-hyprland-opacity.conf
source = ~/.config/hypr/conf.d/nyxus-windowrules.conf

# ── Animations (subtle, glass-feel) ────────────────────────────────────────
animations {
    enabled = true
    bezier  = nyx, 0.25, 0.9, 0.25, 1.0
    animation = windows,    1, 4, nyx, slide
    animation = border,     1, 8, nyx
    animation = fade,       1, 5, nyx
    animation = workspaces, 1, 5, nyx, slide
}

# ── Misc ───────────────────────────────────────────────────────────────────
misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    vfr                      = true
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
}

# ── AUTOSTART · NYXUS bootstrap + desktop daemons ──────────────────────────
# Bootstrap runs once per login — it's idempotent, fast on subsequent runs
# (every dl is a no-op when files already exist + match).
exec-once = /usr/local/bin/nyxus-bootstrap > /tmp/nyxus-bootstrap.log 2>&1
exec-once = waybar
exec-once = dunst
exec-once = hypridle
exec-once = hyprpaper
exec-once = nm-applet --indicator
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ── Keybinds (minimal — daily-driver overrides expected) ───────────────────
$mod = SUPER

bind = $mod,       Q,      killactive,
bind = $mod,       Return, exec, alacritty
bind = $mod,       Space,  exec, /home/nyx/.local/bin/nyxus-start
bind = $mod,       L,      exec, hyprlock
bind = $mod SHIFT, E,      exec, wlogout
bind = $mod,       F,      fullscreen,
bind = $mod,       V,      togglefloating,

bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,  exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown,exec, brightnessctl set 5%-
