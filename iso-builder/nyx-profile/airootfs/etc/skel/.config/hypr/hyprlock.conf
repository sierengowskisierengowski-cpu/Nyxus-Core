# ============================================================
#  NYXUS — Hyprlock Lock Screen
#  ~/.config/hypr/hyprlock.conf
#
#  rev 2026-05-13 r2 — fix overlap + clearer hierarchy.
#  Coordinates use hyprlock's centre-anchored frame; positive Y
#  is up. The previous layout collided the clock (y=280, font 80)
#  with the seconds (y=212, font 22) — they overlapped in the
#  ~200-220 band. New layout enforces a 24px+ gap between every
#  label using font_size as the spacing budget.
#
#  Layout (top → bottom, after re-spacing):
#    +360  clock          (font 88)
#    +260  seconds        (font 22)
#    +210  date           (font 13)
#    +160  separator      (font 10)
#    +100  ◤ X ◥ glyph    (font 52)
#    + 30  NYXUS wordmark (font 24)
#    -  6  tagline        (font 11)
#    - 60  wrong-pw msg   (font 11)
#    -130  password input (52 tall)
#    -210  caps lock      (font 10)
#    -310  copyright      (font  8)
#
#  Silent. Dark. Purely Functional.
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

general {
    grace              = 0
    hide_cursor        = true
    no_fade_in         = false
    no_fade_out        = false
    ignore_empty_input = false
    text_trim          = true
}

# nyxus accent — written by Settings → Appearance → Accent.
# Defines $nyxus_accent_r/g/b and $nyxus_accent_rgba. Sourced
# unconditionally; hyprlock silently ignores a missing source.
source = ~/.config/hypr/hyprlock-accent.conf

# ── BACKGROUND ──────────────────────────────────────────────
# DARK MIRROR wallpaper with a heavy blur + ink wash so the
# foreground labels stay readable while the user still feels
# they're inside the same world as their desktop. Hyprlock
# silently falls back to the flat colour if the path 404s,
# so keep both `path` and `color` set.
background {
    monitor           =
    color             = rgb(06050A)
    path              = ~/.config/hypr/walls/nyxus-login-stars.png
    blur_size         = 10
    blur_passes       = 4
    brightness        = -0.55
    contrast          = 0.92
    vibrancy          = 0.08
    vibrancy_darkness = 0.25
}

# ── CLOCK (HH:MM) ────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H:%M")"
    color       = rgba(192, 132, 252, 1.0)
    font_size   = 88
    font_family = JetBrains Mono Bold

    shadow_passes = 3
    shadow_size   = 22
    shadow_color  = rgba(192, 132, 252, 0.45)
    shadow_boost  = 1.8

    position = 0, 360
    halign   = center
    valign   = center
}

# ── SECONDS (own row, well below clock) ──────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%S")"
    color       = rgba(120, 80, 160, 0.7)
    font_size   = 22
    font_family = JetBrains Mono

    shadow_passes = 1
    shadow_size   = 8
    shadow_color  = rgba(192, 132, 252, 0.2)

    position = 0, 260
    halign   = center
    valign   = center
}

# ── DATE ─────────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date '+%A · %B %d · %Y')"
    color       = rgba(170, 160, 200, 0.85)
    font_size   = 13
    font_family = JetBrains Mono

    shadow_passes = 1
    shadow_size   = 4
    shadow_color  = rgba(0, 0, 0, 0.85)

    position = 0, 210
    halign   = center
    valign   = center
}

# ── SEPARATOR (hairline) ─────────────────────────────────────
label {
    monitor     =
    text        = ─────────────────  ◇  ─────────────────
    color       = rgba(192, 132, 252, 0.18)
    font_size   = 10
    font_family = JetBrains Mono

    position = 0, 160
    halign   = center
    valign   = center
}

# ── LOGO MARK ────────────────────────────────────────────────
label {
    monitor     =
    text        = ◤ X ◥
    color       = rgba(192, 132, 252, 1.0)
    font_size   = 52
    font_family = JetBrains Mono Bold

    shadow_passes = 4
    shadow_size   = 28
    shadow_color  = rgba(192, 132, 252, 0.55)
    shadow_boost  = 2.2

    position = 0, 100
    halign   = center
    valign   = center
}

# ── WORDMARK ─────────────────────────────────────────────────
label {
    monitor     =
    text        = NYXUS
    color       = rgba(192, 132, 252, 1.0)
    font_size   = 24
    font_family = JetBrains Mono Bold

    shadow_passes = 3
    shadow_size   = 14
    shadow_color  = rgba(192, 132, 252, 0.4)
    shadow_boost  = 1.5

    position = 0, 30
    halign   = center
    valign   = center
}

# ── TAGLINE ──────────────────────────────────────────────────
label {
    monitor     =
    text        = Silent. Dark. Purely Functional.
    color       = rgba(110, 100, 140, 0.9)
    font_size   = 11
    font_family = JetBrains Mono

    shadow_passes = 0

    position = 0, -6
    halign   = center
    valign   = center
}

# ── WRONG PASSWORD ───────────────────────────────────────────
label {
    monitor     =
    text        = $FAIL
    color       = rgba(248, 113, 113, 0.95)
    font_size   = 11
    font_family = JetBrains Mono

    shadow_passes = 2
    shadow_size   = 8
    shadow_color  = rgba(248, 113, 113, 0.5)

    position = 0, -60
    halign   = center
    valign   = center
}

# ── PASSWORD INPUT ───────────────────────────────────────────
input-field {
    monitor =

    size              = 360, 52
    outline_thickness = 2
    dots_size         = 0.26
    dots_spacing      = 0.22
    dots_center       = true
    dots_rounding     = -1

    outer_color = rgba(192, 132, 252, 0.85)
    inner_color = rgba(8, 8, 8, 0.97)
    font_color  = rgba(192, 132, 252, 1.0)
    font_family = JetBrains Mono

    fade_on_empty = true
    fade_timeout  = 1200

    placeholder_text = passphrase

    rounding = 0

    check_color     = rgba(52, 211, 153, 1.0)
    fail_color      = rgba(248, 113, 113, 1.0)
    fail_text       = ACCESS DENIED
    fail_transition = 200

    capslock_color  = rgba(251, 146, 60, 1.0)
    numlock_color   = -1
    bothlock_color  = -1
    invert_numlock  = false
    swap_font_color = false

    shadow_passes = 4
    shadow_size   = 14
    shadow_color  = rgba(192, 132, 252, 0.40)
    shadow_boost  = 1.4

    position = 0, -130
    halign   = center
    valign   = center
}

# ── CAPS LOCK ────────────────────────────────────────────────
label {
    monitor     =
    text        = $LAYOUT[en] · CAPS $LOCKED
    color       = rgba(251, 146, 60, 0.7)
    font_size   = 10
    font_family = JetBrains Mono

    shadow_passes = 1
    shadow_size   = 5
    shadow_color  = rgba(251, 146, 60, 0.3)

    position = 0, -210
    halign   = center
    valign   = center
}

# ── COPYRIGHT ────────────────────────────────────────────────
label {
    monitor     =
    text        = © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
    color       = rgba(70, 65, 90, 0.85)
    font_size   = 8
    font_family = JetBrains Mono

    shadow_passes = 0

    position = 0, -310
    halign   = center
    valign   = center
}
