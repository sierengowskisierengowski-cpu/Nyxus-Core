# ═══════════════════════════════════════════════════════════════════════════
#  NYXUS · hyprlock · DARK MIRROR void lock screen (rev 2026-05-11)
#  ~/.config/hypr/hyprlock.conf
#
#  PALETTE  (locked — matches SDDM + waybar + app chrome)
#    void          #000000
#    ink           #050507
#    glass         rgba(08, 12, 20, 0.55)
#    glass deep    rgba(15, 20, 32, 0.72)
#    hairline      rgba(255, 255, 255, 0.10)
#    text          #e8edf5
#    text dim      #c8ccd6
#    text hint     #6a6e78
#    white glow    #ffffff
#
#  AUTH STACK  (PAM service: hyprlock — see /etc/pam.d/hyprlock)
#    1. fingerprint  (fprintd)        — auto-tries first if hardware present
#    2. face        (howdy)           — silent IR scan in parallel
#    3. password    (system passwd)   — fallback / always available
#
#  © 2026 Joseph Sierengowski · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ═══════════════════════════════════════════════════════════════════════════

general {
    hide_cursor              = true
    grace                    = 0
    disable_loading_bar      = false
    immediate_render         = true
    text_trim                = true
    ignore_empty_input       = true
    fail_timeout             = 1500
}

# ── BACKGROUND ─────────────────────────────────────────────────────────────
# Same vortex wallpaper as the desktop, then a heavy black wash so the
# artwork only whispers through. Lock-screen reads as void-with-content,
# not a recap of the desktop.
background {
    monitor   =
    path      = ~/.config/hypr/walls/nyxus-void-vortex.png
    blur_passes = 4
    blur_size   = 9
    noise       = 0.0117
    contrast    = 0.85
    brightness  = 0.32
    vibrancy    = 0.10
    vibrancy_darkness = 0.05
}

# ── DARK WASH OVER BLURRED BG ──────────────────────────────────────────────
# Solid-colour shape sitting just above the background; sells the
# "screen is locked" mood and improves text contrast.
shape {
    monitor       =
    size          = 4000, 4000
    color         = rgba(0, 0, 0, 0.72)
    rounding      = 0
    border_size   = 0
    position      = 0, 0
    halign        = center
    valign        = center
    z             = -50
}

# ── TIME ────────────────────────────────────────────────────────────────────
label {
    monitor    =
    text       = cmd[update:1000] echo "$(date +'%H:%M')"
    color      = rgba(232, 237, 245, 1.0)
    font_size  = 128
    font_family = Inter Light
    position   = 0, -160
    halign     = center
    valign     = center
    shadow_passes = 0
}

# ── DATE ────────────────────────────────────────────────────────────────────
label {
    monitor    =
    text       = cmd[update:60000] echo "$(date +'%A · %-d %B %Y' | tr '[:lower:]' '[:upper:]')"
    color      = rgba(200, 204, 214, 0.85)
    font_size  = 13
    font_family = Inter
    position   = 0, -68
    halign     = center
    valign     = center
}

# ── TAGLINE ────────────────────────────────────────────────────────────────
label {
    monitor    =
    text       = WELCOME TO THE DARKSIDE
    color      = rgba(106, 110, 120, 0.85)
    font_size  = 10
    font_family = Inter
    position   = 0, 12
    halign     = center
    valign     = center
}

# ── USER LABEL ─────────────────────────────────────────────────────────────
label {
    monitor    =
    text       = $USER
    color      = rgba(232, 237, 245, 1.0)
    font_size  = 14
    font_family = Inter Medium
    position   = 0, 56
    halign     = center
    valign     = center
}

# ── PASSWORD INPUT ─────────────────────────────────────────────────────────
input-field {
    monitor       =
    size          = 380, 48
    outline_thickness = 1
    dots_size     = 0.22
    dots_spacing  = 0.55
    dots_center   = true
    dots_rounding = -1
    outer_color   = rgba(255, 255, 255, 0.10)
    inner_color   = rgba(15, 20, 32, 0.72)
    font_color    = rgba(232, 237, 245, 1.0)
    fade_on_empty = false
    placeholder_text = <span foreground="##6a6e78"><i>enter passphrase · or use biometrics</i></span>
    hide_input    = false
    rounding      = 12
    check_color   = rgba(230, 240, 255, 0.55)
    fail_color    = rgba(180, 36, 36, 0.85)
    fail_text     = <i>$FAIL · ACCESS DENIED</i>
    fail_transition = 200
    capslock_color  = rgba(230, 200, 60, 0.65)
    numlock_color   = -1
    bothlock_color  = -1
    invert_numlock  = false
    swap_font_color = false
    position      = 0, 110
    halign        = center
    valign        = center
}

# ── BIOMETRIC HINT ROW (informational; auth runs via PAM in background) ────
label {
    monitor    =
    text       = ◐  FINGERPRINT  ·  ◑  FACE  ·  ◒  PASSPHRASE
    color      = rgba(106, 110, 120, 0.55)
    font_size  = 9
    font_family = Inter
    position   = 0, 178
    halign     = center
    valign     = center
}

# ── BOTTOM-LEFT WORDMARK ───────────────────────────────────────────────────
label {
    monitor    =
    text       = SIERENGOWSKI
    color      = rgba(106, 110, 120, 0.65)
    font_size  = 9
    font_family = Inter
    position   = 28, 24
    halign     = left
    valign     = bottom
}

# ── BOTTOM-RIGHT BUILD STAMP ───────────────────────────────────────────────
label {
    monitor    =
    text       = NYXUS · DARK MIRROR · NYX-J5W-2026
    color      = rgba(106, 110, 120, 0.55)
    font_size  = 9
    font_family = Inter
    position   = -28, 24
    halign     = right
    valign     = bottom
}
