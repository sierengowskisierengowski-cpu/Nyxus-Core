# NYXUS · hyprpaper config · rev 2026-05-13 r1
# Default desktop wallpaper for new users. The .png is shipped under
# ~/.config/hypr/walls/ via the skel tree (build-iso.sh seeds it from
# nyxus-scripts/wallpapers/). hyprpaper silently no-ops if the path is
# missing, so worst case the desktop falls through to the swaybg backup
# in hyprland.conf.
preload  = ~/.config/hypr/walls/nyxus-bg-darkmirror.png
preload  = ~/.config/hypr/walls/nyxus-login-stars.png

wallpaper = ,~/.config/hypr/walls/nyxus-bg-darkmirror.png

# splash text disabled — DARK MIRROR is supposed to be silent.
splash = false
ipc    = on
