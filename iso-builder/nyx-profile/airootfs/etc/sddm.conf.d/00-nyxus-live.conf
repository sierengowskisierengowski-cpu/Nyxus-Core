# NYXUS · SDDM live-ISO autologin · rev 2026-05-13 r1
# Auto-logs the live `nyx` user straight into Hyprland so the live ISO
# feels instant. Calamares wipes this file via shellprocess at install
# time so installed systems still prompt for login.
[Theme]
Current=nyxus
CursorTheme=Adwaita
Font=Inter

[Autologin]
User=nyx
Session=hyprland.desktop
Relogin=false

[General]
DefaultPath=/usr/local/sbin:/usr/local/bin:/usr/bin
RememberLastUser=true
RememberLastSession=true
