# NYXUS — installed-system initramfs config
# This is what gets copied to /etc/mkinitcpio.conf when the user installs to disk.
# The live ISO uses archiso's separate /etc/mkinitcpio.conf.d/archiso.conf instead.
#
# After install, run:  mkinitcpio -P
# (Phantom installer should already do this — see Gotchas in /etc/nyxus/replit.md)

# vim:set ft=sh
# MODULES — kernel modules to load early in initramfs
#
# IMPORTANT (LOCKED · 2026-05-10) for hybrid graphics laptops with both
# Intel iGPU and NVIDIA dGPU (e.g. MSI GS77 i9-12900H + RTX 3060):
#
#   i915 MUST come BEFORE the nvidia_* modules.
#
# Per Hyprland wiki: without this, Electron/Chromium apps stall for up
# to a minute after boot. Order matters — i915 first, then early-KMS
# nvidia stack.
#
# Side-effect to be aware of: early-KMS can break hibernation resume.
# We accept that tradeoff because suspend (S3) still works fine, and
# this is a desktop laptop, not a server.
MODULES=(i915 nvidia nvidia_modeset nvidia_uvm nvidia_drm)

# BINARIES — additional userspace binaries to ship in initramfs
BINARIES=()

# FILES — extra files to ship in initramfs
FILES=()

# HOOKS — initramfs build stages, in order
# `plymouth` is inserted by nyxus-scripts/boot-splash/install.sh after udev.
# `microcode` loads CPU firmware (Intel + AMD ucode packages).
# `kms` triggers early modesetting using the MODULES above.
HOOKS=(base udev plymouth autodetect microcode modconf kms keyboard keymap consolefont block filesystems fsck)

# COMPRESSION — initramfs compression (zstd is the Arch default since 2021)
COMPRESSION="zstd"
#COMPRESSION_OPTIONS=()

# MODULES_DECOMPRESS — decompress modules early (saves boot time on slow disks)
#MODULES_DECOMPRESS="yes"
