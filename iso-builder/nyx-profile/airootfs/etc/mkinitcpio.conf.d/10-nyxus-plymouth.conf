# NYXUS — installed-system initramfs override (NOT used by live ISO).
# When the user runs `nyxus-install` and the installer runs `mkinitcpio -P`
# against the standard /etc/mkinitcpio.conf, this file overrides the HOOKS
# line to include plymouth right after udev. The live ISO ignores this
# because mkarchiso reads archiso.conf above instead.

HOOKS=(base udev plymouth autodetect microcode modconf kms keyboard keymap consolefont block filesystems fsck)
