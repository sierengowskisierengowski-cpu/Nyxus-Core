# NYXUS — live archiso initramfs hook override (archiso 88+)
#
# Adds `plymouth` immediately after `udev` so the void boot splash takes
# over the framebuffer before the archiso hooks mount the squashfs root.
# Without this, the splash would only appear after switch-root + systemd
# handoff (you'd see the kernel scroll first, then the splash blink in late).
#
# This is the canonical archiso 88 releng hook list with `plymouth`
# injected. The old PXE-boot hooks (archiso_pxe_common / _nbd / _http /
# _nfs), archiso_shutdown, and memdisk were REMOVED upstream in archiso
# 88 — including any of them causes "Hook ... cannot be found" /
# "file not found: /usr/lib/initcpio/ipconfig" / "binary not found:
# nbd-client" errors and aborts the live initramfs build.

MODULES=()
BINARIES=()
FILES=()
HOOKS=(base udev plymouth modconf kms keyboard keymap consolefont block filesystems archiso archiso_loop_mnt)
