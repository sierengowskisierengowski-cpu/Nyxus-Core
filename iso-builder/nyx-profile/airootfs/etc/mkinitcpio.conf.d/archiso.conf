# NYXUS — live archiso initramfs hook override
# Adds `plymouth` immediately after `udev` so the void boot splash takes
# over the framebuffer before the archiso hooks mount the squashfs root.
# Without this, the splash would only appear after switch-root + systemd
# handoff (you'd see the kernel scroll first, then the splash blink in late).
#
# Order is the standard archiso 88 releng hook list with `plymouth` injected.

MODULES=()
BINARIES=()
FILES=()
HOOKS=(base udev plymouth memdisk archiso_shutdown archiso archiso_loop_mnt archiso_pxe_common archiso_pxe_nbd archiso_pxe_http archiso_pxe_nfs archiso_kms block filesystems keyboard)
