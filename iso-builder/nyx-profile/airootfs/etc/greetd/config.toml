#
# greetd is the sole display manager for the NYX live ISO session.
# agreety (greetd's built-in default greeter, shipped with the greetd
# package in the official Arch `extra` repo) is used so the build does
# NOT need chaotic-aur or AUR access. The live session auto-logs the
# `nyx` user directly into Hyprland.
# SDDM and all other display managers must NOT be active alongside this.

[terminal]
vt = 1

[default_session]
command = "agreety --cmd Hyprland"
user = "greeter"

[initial_session]
command = "Hyprland"
user = "nyx"
