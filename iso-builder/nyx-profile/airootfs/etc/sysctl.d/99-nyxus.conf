# NYXUS · kernel sysctl tuning · rev 2026-05-13 r1
# - vm.swappiness 10 favours RAM cache over swap (we ship zram).
# - dirty_*ratio = quicker flushes, less hang on USB unplug.
# - tcp_bbr = better latency/throughput on most home links.
# - kernel.dmesg_restrict = limit dmesg to root (small hardening win).
# - net.ipv4.ping_group_range = let unprivileged users use ping (UX).
vm.swappiness = 10
vm.vfs_cache_pressure = 50
vm.dirty_background_ratio = 5
vm.dirty_ratio = 10
net.core.default_qdisc = fq_codel
net.ipv4.tcp_congestion_control = bbr
kernel.dmesg_restrict = 1
kernel.unprivileged_bpf_disabled = 1
net.ipv4.ping_group_range = 0 2147483647
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 512
