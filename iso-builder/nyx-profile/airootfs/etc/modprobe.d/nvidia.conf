# NYXUS — NVIDIA DRM kernel modesetting
# Arch ships this file via the nvidia-utils package, but we set it
# explicitly here so it's correct from first boot regardless of package
# install order. modeset=1 is required for Wayland support.
#
# As of nvidia driver 570.86.16+, fbdev is auto-enabled when modeset=1.
# Per Hyprland wiki: https://wiki.hypr.land/Nvidia/

options nvidia_drm modeset=1
