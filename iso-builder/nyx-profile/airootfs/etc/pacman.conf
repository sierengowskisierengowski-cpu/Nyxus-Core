#
# Replaces /etc/pacman.conf on the LIVE ISO and the INSTALLED system.
# Key change vs Arch default: [multilib] is enabled by default — required
# for Steam, Wine, lib32-* gaming packages, and lib32-nvidia-utils.

[options]
HoldPkg     = pacman glibc
Architecture = auto
CheckSpace
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional
ParallelDownloads = 5
Color
ILoveCandy
VerbosePkgLists

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist
