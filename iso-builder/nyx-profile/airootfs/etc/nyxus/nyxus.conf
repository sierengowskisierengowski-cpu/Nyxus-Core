# ============================================================================
#  /etc/nyxus/nyxus.conf — system-wide safe defaults
#  NYXUS — DARK MIRROR rev 2026-05-09 r1
#
#  These are NON-SECRET defaults baked into the live ISO. User overrides go
#  in ~/.config/nyxus/nyxus.conf.  Do NOT put API keys, tokens, or any
#  identifying credentials here — they belong in the user's home dir, never
#  the system image.
# ============================================================================

[general]
# Logging: trace | debug | info | warn | error
log_level = info

# Auto-update check on app launch (network-permitting). Set to false to
# disable all phone-home behavior.
update_check = true

[branding]
distro          = NYXUS
distro_version  = 2026.05.09
creator         = SIERENGOWSKI
website         = https://nyxus-core.replit.app

[endpoints]
# Public endpoints used by the resync / install pipeline. No auth required.
resync_base    = https://nyxus-core.replit.app/api/download/nyxus
manifest_url   = https://nyxus-core.replit.app/api/download/nyxus/manifest.json

[ui]
# Enforces the locked DARK MIRROR visual system. Apps SHOULD honor this.
theme          = dark-mirror
font_family    = Inter
mono_family    = JetBrains Mono Nerd Font
accent_policy  = monochrome-only
