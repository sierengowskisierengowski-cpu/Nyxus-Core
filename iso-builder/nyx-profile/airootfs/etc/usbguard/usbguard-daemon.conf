# /etc/usbguard/usbguard-daemon.conf · NYXUS rev 2026-05-14
#
# Safe-by-default: daemon present but PERMISSIVE so no installed user
# is ever locked out of their own keyboard. Per user preference,
# lockout-style policies are opt-in post-install via the Settings UI.
#
# UsbPage in nyxus_settings.py reads + writes these knobs and exposes
# the "lockdown mode" toggle that flips InsertedDevicePolicy to
# `apply-policy` and seeds a starter ruleset from currently-attached
# devices.

RuleFile=/etc/usbguard/rules.conf

ImplicitPolicyTarget=allow
PresentDevicePolicy=allow
PresentControllerPolicy=allow
InsertedDevicePolicy=apply-policy
AuthorizedDefault=all

RestoreControllerDeviceState=false
DeviceManagerBackend=uevent

IPCAllowedUsers=root
IPCAllowedGroups=wheel

DeviceRulesWithPort=false
AuditBackend=LinuxAudit
AuditFilePath=/var/log/usbguard/usbguard-audit.log
HidePII=false
