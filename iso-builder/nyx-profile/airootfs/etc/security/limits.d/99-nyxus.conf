# NYXUS · per-user resource limits · rev 2026-05-13 r1
# - rt-prio + memlock unlimited let pipewire run JACK-class realtime.
# - nofile 524288 prevents "too many open files" for IDEs / browsers.
*                hard    nofile          524288
*                soft    nofile          524288
@audio           -       rtprio          95
@audio           -       memlock         unlimited
@audio           -       nice            -19
