kind = "web"
previewPath = "/nyxus-stickies/"
title = "NYXUS Stickies"
version = "1.0.0"
id = "artifacts/nyxus-stickies"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/nyxus-stickies/" ]
localPort = 20682

[services.development]
run = "pnpm --filter @workspace/nyxus-stickies run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nyxus-stickies", "run", "build" ]
publicDir = "artifacts/nyxus-stickies/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20682"
BASE_PATH = "/nyxus-stickies/"
