kind = "web"
previewPath = "/nyxus-widgets/"
title = "NYXUS Widgets"
version = "1.0.0"
id = "artifacts/nyxus-widgets"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/nyxus-widgets/" ]
localPort = 23437

[services.development]
run = "pnpm --filter @workspace/nyxus-widgets run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nyxus-widgets", "run", "build" ]
publicDir = "artifacts/nyxus-widgets/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23437"
BASE_PATH = "/nyxus-widgets/"
