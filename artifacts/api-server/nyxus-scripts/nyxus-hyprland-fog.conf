# ============================================================
#  NYXUS — Hyprland fog daemon layerrules (rev 2026-05-06k)
#  ~/.config/hypr/conf.d/nyxus-hyprland-fog.conf
#
#  Companion config for nyxus-fog.py (the Cairo particle daemon
#  that paints swirling fog under each waybar). Without these
#  rules the fog window inherits the global compositor blur and
#  gets smeared into a uniform haze.
#
#  Source from your hyprland.conf:
#    source = ~/.config/hypr/conf.d/nyxus-hyprland-fog.conf
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

# Fog window must never be blurred — IT IS the visual effect.
layerrule = noblur,    nyxus-fog
# Skip the fade-in animation when fog daemon spawns.
layerrule = noanim,    nyxus-fog
# Don't let it intercept input (it shouldn't, but belt-and-braces).
layerrule = noinput, nyxus-fog
# Don't let opacity rules dim it.
layerrule = ignorealpha 0, nyxus-fog

# Fog daemon autostart DISABLED (rev 2026-05-06m). User pivoted away from
# live fog in favor of stronger frosted-glass blur. Layerrules above remain
# in case the daemon is ever launched manually.
# exec-once = sh -c 'pkill -f nyxus-fog.py; python3 ~/.nyxus/nyxus-fog.py >/tmp/nyxus-fog.log 2>&1 &'
