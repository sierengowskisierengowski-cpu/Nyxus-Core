# ============================================================
#  NYXUS — Hyprlock Lock Screen
#  ~/.config/hypr/hyprlock.conf
#
#  Silent. Dark. Purely Functional.
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

general {
    grace              = 0
    hide_cursor        = true
    no_fade_in         = false
    no_fade_out        = false
    ignore_empty_input = false
    text_trim          = true
}

# ── BACKGROUND ──────────────────────────────────────────────
background {
    monitor     =
    color       = rgb(06050A)
    path        =
    blur_size   = 0
    blur_passes = 0
    brightness  = 0.0
    contrast    = 0.0
    vibrancy    = 0.0
}

# ── CLOCK ────────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H:%M")"
    color       = rgba(192, 132, 252, 1.0)
    font_size   = 80
    font_family = JetBrains Mono Bold

    shadow_passes = 3
    shadow_size   = 20
    shadow_color  = rgba(192, 132, 252, 0.45)
    shadow_boost  = 1.8

    position = 0, 280
    halign   = center
    valign   = center
}

# ── SECONDS ──────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%S")"
    color       = rgba(120, 80, 160, 0.7)
    font_size   = 22
    font_family = JetBrains Mono

    shadow_passes = 1
    shadow_size   = 8
    shadow_color  = rgba(192, 132, 252, 0.2)

    position = 0, 212
    halign   = center
    valign   = center
}

# ── DATE ─────────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date '+%A · %B %d · %Y')"
    color       = rgba(80, 70, 100, 0.85)
    font_size   = 13
    font_family = JetBrains Mono

    shadow_passes = 1
    shadow_size   = 4
    shadow_color  = rgba(0, 0, 0, 0.8)

    position = 0, 168
    halign   = center
    valign   = center
}

# ── SEPARATOR ────────────────────────────────────────────────
label {
    monitor     =
    text        = ──────────────────────────────
    color       = rgba(192, 132, 252, 0.12)
    font_size   = 10
    font_family = JetBrains Mono

    position = 0, 116
    halign   = center
    valign   = center
}

# ── LOGO MARK ────────────────────────────────────────────────
label {
    monitor     =
    text        = ◤ X ◥
    color       = rgba(192, 132, 252, 1.0)
    font_size   = 52
    font_family = JetBrains Mono Bold

    shadow_passes = 4
    shadow_size   = 28
    shadow_color  = rgba(192, 132, 252, 0.55)
    shadow_boost  = 2.2

    position = 0, 44
    halign   = center
    valign   = center
}

# ── WORDMARK ─────────────────────────────────────────────────
label {
    monitor     =
    text        = NYXUS
    color       = rgba(192, 132, 252, 1.0)
    font_size   = 24
    font_family = JetBrains Mono Bold

    shadow_passes = 3
    shadow_size   = 14
    shadow_color  = rgba(192, 132, 252, 0.4)
    shadow_boost  = 1.5

    position = 0, -30
    halign   = center
    valign   = center
}

# ── TAGLINE ──────────────────────────────────────────────────
label {
    monitor     =
    text        = Silent. Dark. Purely Functional.
    color       = rgba(60, 55, 80, 0.9)
    font_size   = 11
    font_family = JetBrains Mono

    shadow_passes = 0

    position = 0, -68
    halign   = center
    valign   = center
}

# ── WRONG PASSWORD ────────────────────────────────────────────
label {
    monitor     =
    text        = $FAIL
    color       = rgba(248, 113, 113, 0.9)
    font_size   = 11
    font_family = JetBrains Mono

    shadow_passes = 2
    shadow_size   = 8
    shadow_color  = rgba(248, 113, 113, 0.5)

    position = 0, -105
    halign   = center
    valign   = center
}

# ── CAPS LOCK ────────────────────────────────────────────────
label {
    monitor     =
    text        = $LAYOUT[en] · CAPS $LOCKED
    color       = rgba(251, 146, 60, 0.7)
    font_size   = 10
    font_family = JetBrains Mono

    shadow_passes = 1
    shadow_size   = 5
    shadow_color  = rgba(251, 146, 60, 0.3)

    position = 0, -290
    halign   = center
    valign   = center
}

# ── PASSWORD INPUT ────────────────────────────────────────────
input-field {
    monitor =

    size              = 340, 52
    outline_thickness = 2
    dots_size         = 0.26
    dots_spacing      = 0.22
    dots_center       = true
    dots_rounding     = -1

    outer_color = rgba(192, 132, 252, 0.85)
    inner_color = rgba(8, 8, 8, 0.97)
    font_color  = rgba(192, 132, 252, 1.0)
    font_family = JetBrains Mono

    fade_on_empty = true
    fade_timeout  = 1200

    placeholder_text = passphrase

    rounding = 0

    check_color     = rgba(52, 211, 153, 1.0)
    fail_color      = rgba(248, 113, 113, 1.0)
    fail_text       = ACCESS DENIED
    fail_transition = 200

    capslock_color  = rgba(251, 146, 60, 1.0)
    numlock_color   = -1
    bothlock_color  = -1
    invert_numlock  = false
    swap_font_color = false

    shadow_passes = 4
    shadow_size   = 14
    shadow_color  = rgba(192, 132, 252, 0.40)
    shadow_boost  = 1.4

    position = 0, -160
    halign   = center
    valign   = center
}

# ── COPYRIGHT ────────────────────────────────────────────────
label {
    monitor     =
    text        = © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
    color       = rgba(30, 28, 40, 0.8)
    font_size   = 8
    font_family = JetBrains Mono

    shadow_passes = 0

    position = 0, -340
    halign   = center
    valign   = center
}
