# ─────────────────────────────────────────────────────────────────────────
# NYXUS hyprlock · DARK MIRROR · LOCKED rev 2026-05-07 r13
# Drop into ~/.config/hypr/hyprlock.conf and run: hyprlock
#
# Visual System: matches the unified DARK MIRROR · UNIFIED FROSTED GLASS
# spec (apps + flyout + waybar + sddm). Pure monochrome — white /
# off-white #e8edf5 / light grey #c8ccd6 / faded black / ink black.
# No pink, no green, no gold, no neon anywhere.
# ─────────────────────────────────────────────────────────────────────────

general {
    disable_loading_bar = true
    grace = 2
    hide_cursor = false
    no_fade_in = false
    ignore_empty_input = true
}

# ── Background: OBSIDIAN STARFIELD (rev r34 · 2026-05-12). Mirrors the SDDM
# login screen — same nyxus-login-stars.png so lock and login feel like one
# continuous surface. Light blur keeps stars recognizable; brightness pulled
# down so the field becomes ambient mood, not glare.
background {
    monitor =
    path = ~/.config/hypr/walls/nyxus-login-stars.png
    blur_passes = 1
    blur_size = 3
    contrast = 1.05
    brightness = 0.55
    vibrancy = 0.0
    vibrancy_darkness = 0.0
}

# ── Bottom dark vignette so text/input read against the eye. Sits at the
# bottom half only; the eye stays visible in the upper third. ───────────
shape {
    monitor =
    size = 3000, 1100
    color = rgba(0, 0, 0, 0.62)
    rounding = 0
    border_size = 0
    position = 0, -450
    halign = center
    valign = center
}

# ── NYXUS wordmark · top center · off-white starlight ──────────────────
label {
    monitor =
    text = NYXUS
    color = rgba(232, 237, 245, 1.0)
    font_size = 96
    font_family = Inter Display, Inter
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.85)
    shadow_boost = 1.2
    position = 0, 220
    halign = center
    valign = center
}

# ── SIERENGOWSKI · subtle creator wordmark ─────────────────────────────
label {
    monitor =
    text = SIERENGOWSKI · 2026
    color = rgba(200, 204, 214, 0.85)
    font_size = 13
    font_family = JetBrains Mono
    position = 0, 168
    halign = center
    valign = center
}

# ── Live clock (HH:MM:SS) ──────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M:%S')"
    color = rgba(232, 237, 245, 0.95)
    font_size = 36
    font_family = JetBrains Mono Bold
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.85)
    position = 0, 100
    halign = center
    valign = center
}

# ── Date line ──────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%A · %B %d, %Y')" | tr '[:lower:]' '[:upper:]'
    color = rgba(200, 204, 214, 0.80)
    font_size = 13
    font_family = JetBrains Mono
    position = 0, 60
    halign = center
    valign = center
}

# ── User greeting · monochrome ─────────────────────────────────────────
label {
    monitor =
    text = SIGN IN AS $USER
    color = rgba(168, 176, 189, 0.90)
    font_size = 12
    font_family = JetBrains Mono Bold
    position = 0, 20
    halign = center
    valign = center
}

# ── Password input · DARK MIRROR pebble ────────────────────────────────
input-field {
    monitor =
    size = 460, 56
    outline_thickness = 1
    dots_size = 0.28
    dots_spacing = 0.42
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(232, 237, 245, 0.30)
    inner_color = rgba(15, 20, 32, 0.85)
    font_color = rgba(232, 237, 245, 1.0)
    fade_on_empty = false
    placeholder_text = <span foreground="#c8ccd6" alpha="65%" font_family="Inter">enter passphrase</span>
    hide_input = false
    rounding = 12
    check_color  = rgba(232, 237, 245, 0.75)
    fail_color   = rgba(232, 237, 245, 0.95)
    fail_text    = <span foreground="#e8edf5" font_family="Inter" weight="bold">WRONG — $ATTEMPTS attempts</span>
    capslock_color = rgba(232, 237, 245, 0.95)
    numlock_color  = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -50
    halign = center
    valign = center
}

# ── Battery / status (bottom-right) ────────────────────────────────────
label {
    monitor =
    text = cmd[update:5000] sh -c 'cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1 | sed "s/$/% BATTERY/" || echo "AC POWER"'
    color = rgba(168, 176, 189, 0.75)
    font_size = 11
    font_family = JetBrains Mono
    position = -40, 30
    halign = right
    valign = bottom
}

# ── Signature (bottom-left) ────────────────────────────────────────────
label {
    monitor =
    text = NYXUS · HYPRLAND · NYX-J5W-2026
    color = rgba(168, 176, 189, 0.75)
    font_size = 11
    font_family = JetBrains Mono
    position = 40, 30
    halign = left
    valign = bottom
}
