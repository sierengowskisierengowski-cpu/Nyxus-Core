# ============================================================
#  NYXUS — Seattle Frost decoration profile
#  ~/.config/hypr/conf.d/nyxus-seattle-frost.conf
#
#  Sourced by hyprland.conf via:
#      source = ~/.config/hypr/conf.d/nyxus-seattle-frost.conf
#
#  This file lays the "physical" Seattle Frost rules over your
#  existing hyprland.conf — gaps like a framed sketch, thin
#  pencil-stroke borders, milk-white frosted blur with grain.
#
#  Pairs with chrome.py r9+ which provides the cream/fog/tar
#  CSS palette inside every NYXUS GTK4 app.
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

# ── General: pencil-line borders + framed-sketch gaps ──────────────────────
general {
    gaps_in  = 10
    gaps_out = 20
    border_size = 1
    # Soft semi-transparent silver — looks like a fine pencil stroke
    col.active_border   = rgba(d1d1d188)
    # Faded charcoal for backgrounded windows
    col.inactive_border = rgba(31313144)
    layout = dwindle
}

# ── Decoration: thick frosted-glass milk-white blur ────────────────────────
decoration {
    rounding = 15
    active_opacity   = 0.85
    inactive_opacity = 0.70

    blur {
        enabled = true
        size    = 12        # Thicker glass — more "frost", less "see-through"
        passes  = 4         # More passes = smoother, creamier frosting
        new_optimizations = true
        ignore_opacity    = true

        brightness = 1.4    # KEY: pushes the blur toward milk-white
        vibrancy   = 0.2    # Low — keeps colors muted, "Seattle misty"
        noise      = 0.04   # Etched-glass grain so it feels physical
    }
}

# ── Layer rules: blur waybar + gtk-layer-shell flyouts to match windows ───
layerrule = blur, waybar
layerrule = blur, gtk-layer-shell
layerrule = blur, notifications
layerrule = ignorezero, waybar
