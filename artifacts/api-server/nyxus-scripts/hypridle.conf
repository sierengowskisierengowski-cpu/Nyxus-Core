# ============================================================
#  NYXUS — Hypridle Config (rev r17 · jumpscare-tuned)
#  ~/.config/hypr/hypridle.conf
#
#  Idle pipeline (rev r17 — JUMPSCARE-FIRST):
#    30 sec → dim screen to 20%
#     1 min → launch NYXUS screensaver
#             (on-resume: kill screensaver + fire DEMON JUMPSCARE)
#     5 min → lock screen via hyprlock
#     8 min → monitors off (DPMS)
#    15 min → suspend to RAM
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

general {
    lock_cmd            = pidof hyprlock || hyprlock
    before_sleep_cmd    = loginctl lock-session
    after_sleep_cmd     = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# ── 30 sec: dim screen to 20% ───────────────────────────────
listener {
    timeout    = 30
    on-timeout = brightnessctl -s set 20%
    on-resume  = brightnessctl -r
}

# ── 1 min: NYXUS screensaver  (wake → DEMON JUMPSCARE) ──────
# The on-timeout launches the screensaver in the user's session.
# The on-resume tears down the screensaver (user-scoped exact-path
# match so we don't accidentally kill any other process whose cmdline
# happens to contain the substring), then fires the demon-wake overlay
# (deep evil laugh + fullscreen demon + 2.5s fade). `|| true` keeps the
# chain alive when the screensaver isn't actually running.
listener {
    timeout    = 60
    on-timeout = nyxus-screensaver &
    on-resume  = pkill -u $USER -f /usr/share/nyxus/scripts/nyxus_screensaver.py || true ; nyxus-demon-wake &
}

# ── 5 min: lock screen ──────────────────────────────────────
listener {
    timeout    = 300
    on-timeout = loginctl lock-session
}

# ── 8 min: monitors off ─────────────────────────────────────
listener {
    timeout    = 480
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# ── 15 min: suspend to RAM ──────────────────────────────────
listener {
    timeout    = 900
    on-timeout = systemctl suspend
}
