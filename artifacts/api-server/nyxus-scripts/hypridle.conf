# ─────────────────────────────────────────────────────────────────────
# NYXUS · hypridle configuration
# Lives at: ~/.config/hypr/hypridle.conf
#
# Idle pipeline (DARK MIRROR · enterprise-grade):
#   180s  → dim screen + open EWW screensaver overlay (clock + brand)
#   300s  → run hyprlock (full lock, biometrics-aware)
#   600s  → suspend the system
#
# All on-resume actions restore brightness and tear the EWW overlay
# back down so the user lands on a clean session.
#
# © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ─────────────────────────────────────────────────────────────────────

general {
  lock_cmd       = pidof hyprlock || hyprlock
  before_sleep_cmd = loginctl lock-session
  after_sleep_cmd  = hyprctl dispatch dpms on
  ignore_dbus_inhibit = false
}

# 180 s — dim + screensaver overlay
listener {
  timeout      = 180
  on-timeout   = brightnessctl -s set 10% ; eww open screensaver
  on-resume    = brightnessctl -r ; eww close screensaver
}

# 300 s — full lock
listener {
  timeout      = 300
  on-timeout   = eww close screensaver ; loginctl lock-session
  on-resume    = brightnessctl -r
}

# 600 s — suspend
listener {
  timeout      = 600
  on-timeout   = systemctl suspend
}
