# ─────────────────────────────────────────────────────────────────────────────

monitor=,preferred,auto,1

# ── Autostart ────────────────────────────────────────────────────────────────
exec-once = waybar --config ~/.config/waybar/config --style ~/.config/waybar/style.css
exec-once = hypridle
exec-once = mako
exec-once = swaybg -i ~/.config/hypr/walls/nyxus-sierengowski-clean.png -m fill
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ── Environment ──────────────────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland

# ── Input ────────────────────────────────────────────────────────────────────
input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll       = true
        disable_while_typing = true
        tap-to-click         = true
    }
}

# ── General ──────────────────────────────────────────────────────────────────
general {
    gaps_in     = 6
    gaps_out    = 14
    border_size = 3

    col.active_border   = rgba(ff00ffff) rgba(ff5500ff) rgba(ffff00ff) rgba(39ff14ff) rgba(0088ffff) rgba(cc00ffff) rgba(ff00ffff) 45deg
    col.inactive_border = rgba(cc00ff28)

    layout           = dwindle
    resize_on_border = true
}

# ── Decoration ───────────────────────────────────────────────────────────────
decoration {
    rounding = 10

    active_opacity   = 1.0
    inactive_opacity = 0.90

    blur {
        enabled       = true
        size          = 10
        passes        = 4
        new_optimizations = true
        xray          = false
    }

    shadow {
        enabled      = true
        range        = 32
        render_power = 4
        color        = rgba(c084fc44)
        color_inactive = rgba(00000055)
    }
}

# ── Animations ───────────────────────────────────────────────────────────────
animations {
    enabled = true

    bezier = nyxus,      0.05, 0.9,  0.1,  1.05
    bezier = nyx-out,    0.4,  0.0,  1.0,  1.0
    bezier = overshoot,  0.1,  0.85, 0.1,  1.18
    bezier = nyx-soft,   0.25, 0.46, 0.45, 0.94
    bezier = nyx-sharp,  0.16, 1.0,  0.3,  1.0
    bezier = linear,     0.0,  0.0,  1.0,  1.0

    animation = windows,          1, 4,  nyxus,    slide
    animation = windowsOut,       1, 3,  nyx-out,  popin 60%
    animation = windowsMove,      1, 4,  nyx-soft, slide
    animation = border,           1, 10, default
    animation = borderangle,      1, 8,  linear,   loop
    animation = fade,             1, 5,  nyx-out
    animation = fadeIn,           1, 4,  nyx-soft
    animation = fadeOut,          1, 3,  nyx-out
    animation = workspaces,       1, 5,  overshoot, slide
    animation = specialWorkspace, 1, 5,  nyx-soft,  slidevert
}

# ── Layout ───────────────────────────────────────────────────────────────────
dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
}

# ── Misc ─────────────────────────────────────────────────────────────────────
misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    vfr                      = true
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
}


# ─────────────────────────────────────────────────────────────────────────────
# KEY BINDINGS
# ─────────────────────────────────────────────────────────────────────────────
$mod = SUPER

# ── Apps ─────────────────────────────────────────────────────────────────────
bind = $mod,       Return,  exec, alacritty
bind = $mod,       D,       exec, rofi -show drun
bind = $mod SHIFT, D,       exec, rofi -show run
bind = $mod,       Tab,     exec, rofi -show window
bind = $mod,       E,       exec, nautilus
bind = $mod,       B,       exec, firefox

# ── Lock / logout ─────────────────────────────────────────────────────────────
bind = $mod,       L,       exec, hyprlock
bind = $mod SHIFT, E,       exec, wlogout -p layer-shell
bind = $mod SHIFT, M,       exit

# ── Window management ────────────────────────────────────────────────────────
bind = $mod,       Q,       killactive
bind = $mod,       V,       togglefloating
bind = $mod,       P,       pseudo
bind = $mod,       J,       togglesplit
bind = $mod,       F,       fullscreen, 0
bind = $mod SHIFT, F,       fullscreen, 1
bind = $mod,       Space,   centerwindow

# ── Focus ────────────────────────────────────────────────────────────────────
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H,     movefocus, l
bind = $mod, L,     movefocus, r
bind = $mod, K,     movefocus, u
bind = $mod, J,     movefocus, d

# ── Move windows ─────────────────────────────────────────────────────────────
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# ── Resize ───────────────────────────────────────────────────────────────────
bind = $mod CTRL, left,  resizeactive, -40  0
bind = $mod CTRL, right, resizeactive,  40  0
bind = $mod CTRL, up,    resizeactive,   0 -40
bind = $mod CTRL, down,  resizeactive,   0  40

# ── Workspaces ───────────────────────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# ── Scratchpad ────────────────────────────────────────────────────────────────
bind = $mod,       S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace,        special:magic

# ── Mouse ────────────────────────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Media / Volume ───────────────────────────────────────────────────────────
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,        exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute,     exec, wpctl set-mute   @DEFAULT_AUDIO_SOURCE@ toggle
bind = , XF86AudioPlay,        exec, playerctl play-pause
bind = , XF86AudioNext,        exec, playerctl next
bind = , XF86AudioPrev,        exec, playerctl previous

# ── Brightness ───────────────────────────────────────────────────────────────
bind = , XF86MonBrightnessUp,   exec, brightnessctl set 10%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# ── Screenshot ───────────────────────────────────────────────────────────────
bind = ,       Print,    exec, hyprshot -m output
bind = $mod,   Print,    exec, hyprshot -m region
bind = $mod SHIFT, W,    exec, hyprshot -m region

# ── Wallpaper (permanent — SIERENGOWSKI) ──────────────────────────────────────
# Set via exec-once at startup; use Super+Alt+W to reload if needed
bind = $mod ALT, W, exec, pkill swaybg; swaybg -i ~/.config/hypr/walls/nyxus-sierengowski-clean.png -m fill &

# ── Quick Settings panel — positioned by the Python script via hyprctl IPC ────
# (window rules handled at runtime; no static rules needed here)

# ── Waybar layer effects ───────────────────────────────────────────────────────
# (layerrule blur requires specific Hyprland build; disabled for compatibility)
