# ─────────────────────────────────────────────────────────────────────────────
# NYXUS Hyprland Config — Signature Edition
# © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ─────────────────────────────────────────────────────────────────────────────

monitor=,preferred,auto,1

# ── Autostart ────────────────────────────────────────────────────────────────
exec-once = waybar
exec-once = hypridle
exec-once = mako
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = swww-daemon && swww img ~/.config/hypr/nyxus-wallpaper.png \
            --transition-type fade --transition-duration 1.2
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ── Environment ──────────────────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = MOZ_ENABLE_WAYLAND,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland

# ── Input ────────────────────────────────────────────────────────────────────
input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0
    accel_profile = flat

    touchpad {
        natural_scroll    = true
        disable_while_typing = true
        tap-to-click      = true
        scroll_factor     = 0.8
    }
}

# ── General ──────────────────────────────────────────────────────────────────
general {
    gaps_in  = 5
    gaps_out = 10
    border_size = 2

    # Active: neon purple gradient — NYXUS signature
    col.active_border   = rgba(c084fcff) rgba(818cf8ff) rgba(f472b6ff) 60deg
    # Inactive: near-black, barely visible
    col.inactive_border = rgba(0d0a1400)

    layout = dwindle
    resize_on_border = true
    no_focus_fallback = true
}

# ── Decoration ───────────────────────────────────────────────────────────────
decoration {
    rounding = 6

    active_opacity   = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    dim_inactive = true
    dim_strength = 0.08

    blur {
        enabled         = true
        size            = 8
        passes          = 3
        new_optimizations = true
        ignore_opacity  = true
        xray            = false
        noise           = 0.012
        contrast        = 1.0
        brightness      = 0.85
        vibrancy        = 0.18
        vibrancy_darkness = 0.0
        popups          = true
    }

    shadow {
        enabled        = true
        range          = 24
        render_power   = 3
        color          = rgba(c084fc22)
        color_inactive = rgba(00000018)
        offset         = 0, 4
    }
}

# ── Animations ───────────────────────────────────────────────────────────────
animations {
    enabled = true

    # ── Signature NYXUS bezier curves ──────────────────────
    bezier = nyxus,       0.05, 0.9,  0.1,  1.05   # springy pop
    bezier = nyx-out,     0.4,  0.0,  1.0,  1.0    # fast exit
    bezier = nyx-in,      0.0,  0.0,  0.2,  1.0    # smooth enter
    bezier = overshoot,   0.1,  0.85, 0.1,  1.18   # strong overshoot
    bezier = snap,        0.2,  1.0,  0.2,  1.0    # snap into place
    bezier = linear,      0.0,  0.0,  1.0,  1.0    # linear (border spin)
    bezier = ease-out,    0.0,  0.55, 0.45, 1.0    # smooth ease out

    # ── Window animations ───────────────────────────────────
    animation = windows,      1, 4,  nyxus,    slide
    animation = windowsIn,    1, 4,  nyxus,    slide
    animation = windowsOut,   1, 3,  nyx-out,  popin 85%
    animation = windowsMove,  1, 3,  snap

    # ── Border + fade ───────────────────────────────────────
    animation = border,       1, 8,  default
    animation = borderangle,  1, 22, linear,   loop
    animation = fade,         1, 5,  ease-out
    animation = fadeIn,       1, 4,  nyxus
    animation = fadeOut,      1, 3,  nyx-out
    animation = fadeDim,      1, 5,  ease-out
    animation = fadeShadow,   1, 5,  ease-out
    animation = fadeSwitch,   1, 5,  ease-out

    # ── Workspace transitions ───────────────────────────────
    animation = workspaces,          1, 5, overshoot, slide
    animation = specialWorkspace,    1, 4, nyxus,     slidevert

    # ── Layer animations (waybar, rofi, mako) ───────────────
    animation = layers,       1, 3, nyxus, slide
    animation = layersIn,     1, 3, nyxus, slide
    animation = layersOut,    1, 2, nyx-out, fade
}

# ── Layout ───────────────────────────────────────────────────────────────────
dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = false
    smart_resizing = true
}

master {
}

# ── Misc ─────────────────────────────────────────────────────────────────────
misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    vfr                      = true
    vrr                      = 0
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
    animate_manual_resizes   = true
    animate_mouse_windowdragging = true
    enable_swallow           = true
    swallow_regex            = ^(Alacritty)$
    focus_on_activate        = false
}

# ── Layer rules (blur the UI chrome) ─────────────────────────────────────────
layerrule = blur,         waybar
layerrule = blur,         rofi
layerrule = blur,         mako
layerrule = blur,         notifications
layerrule = ignorezero,   waybar
layerrule = ignorezero,   rofi
layerrule = ignorezero,   mako
layerrule = xray off,     rofi

# ── Window rules ─────────────────────────────────────────────────────────────

# Terminal — semi-transparent with blur
windowrulev2 = opacity 0.90 0.82, class:^(Alacritty)$

# File manager
windowrulev2 = opacity 0.95 0.90, class:^(org.gnome.Nautilus)$

# Code editors
windowrulev2 = opacity 0.96 0.92, class:^(Code)$
windowrulev2 = opacity 0.96 0.92, class:^(code-url-handler)$

# Browser — always fully opaque
windowrulev2 = opacity 1.0  1.0,  class:^(firefox)$
windowrulev2 = opacity 1.0  1.0,  class:^(chromium)$
windowrulev2 = opacity 1.0  1.0,  class:^(brave-browser)$

# Floating utilities
windowrulev2 = float,  class:^(pavucontrol)$
windowrulev2 = size  860 520, class:^(pavucontrol)$
windowrulev2 = center,         class:^(pavucontrol)$

windowrulev2 = float,  class:^(blueman-manager)$
windowrulev2 = size  700 480, class:^(blueman-manager)$
windowrulev2 = center,         class:^(blueman-manager)$

windowrulev2 = float,  class:^(nm-connection-editor)$
windowrulev2 = size  700 500, class:^(nm-connection-editor)$
windowrulev2 = center,         class:^(nm-connection-editor)$

windowrulev2 = float,  class:^(org.gnome.Calculator)$
windowrulev2 = size  360 480, class:^(org.gnome.Calculator)$
windowrulev2 = center,         class:^(org.gnome.Calculator)$

windowrulev2 = float,  title:^(Picture-in-Picture)$
windowrulev2 = pin,    title:^(Picture-in-Picture)$

# Dialogs always float and center
windowrulev2 = float,  title:^(Open File)$
windowrulev2 = float,  title:^(Save File)$
windowrulev2 = float,  title:^(Save As)$
windowrulev2 = center, title:^(Open File)$
windowrulev2 = center, title:^(Save File)$
windowrulev2 = center, title:^(Save As)$

# ─────────────────────────────────────────────────────────────────────────────
# KEY BINDINGS
# ─────────────────────────────────────────────────────────────────────────────
$mod = SUPER

# ── Core apps ────────────────────────────────────────────────────────────────
bind = $mod,       Return,    exec, alacritty
bind = $mod,       D,         exec, rofi -show drun
bind = $mod SHIFT, D,         exec, rofi -show run
bind = $mod,       Tab,       exec, rofi -show window
bind = $mod,       E,         exec, nautilus
bind = $mod,       B,         exec, firefox

# ── Lock / logout ─────────────────────────────────────────────────────────────
bind = $mod,       L,         exec, hyprlock
bind = $mod SHIFT, E,         exec, wlogout -p layer-shell
bind = $mod SHIFT, M,         exit

# ── Window management ────────────────────────────────────────────────────────
bind = $mod,       Q,         killactive
bind = $mod,       V,         togglefloating
bind = $mod,       P,         pseudo
bind = $mod,       J,         togglesplit
bind = $mod,       F,         fullscreen, 0
bind = $mod SHIFT, F,         fullscreen, 1
bind = $mod,       Space,     centerwindow

# ── Focus ────────────────────────────────────────────────────────────────────
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H,     movefocus, l
bind = $mod, L,     movefocus, r
bind = $mod, K,     movefocus, u
bind = $mod, J,     movefocus, d

# ── Move windows ─────────────────────────────────────────────────────────────
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d
bind = $mod SHIFT, H,     movewindow, l
bind = $mod SHIFT, L,     movewindow, r
bind = $mod SHIFT, K,     movewindow, u
bind = $mod SHIFT, J,     movewindow, d

# ── Resize ───────────────────────────────────────────────────────────────────
bind = $mod CTRL, left,  resizeactive, -40  0
bind = $mod CTRL, right, resizeactive,  40  0
bind = $mod CTRL, up,    resizeactive,   0 -40
bind = $mod CTRL, down,  resizeactive,   0  40

# ── Workspaces ───────────────────────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# ── Scroll through workspaces ─────────────────────────────────────────────────
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# ── Special (scratchpad) workspace ───────────────────────────────────────────
bind = $mod,       S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace,        special:magic

# ── Mouse ────────────────────────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Media / Volume ───────────────────────────────────────────────────────────
bind = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,         exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute,      exec, wpctl set-mute   @DEFAULT_AUDIO_SOURCE@ toggle
bind = , XF86AudioPlay,         exec, playerctl play-pause
bind = , XF86AudioNext,         exec, playerctl next
bind = , XF86AudioPrev,         exec, playerctl previous

# ── Brightness ───────────────────────────────────────────────────────────────
bind = , XF86MonBrightnessUp,   exec, brightnessctl set 10%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# ── Screenshot ───────────────────────────────────────────────────────────────
bind = ,       Print,    exec, hyprshot -m output
bind = $mod,   Print,    exec, hyprshot -m region
bind = $mod SHIFT, S,    exec, hyprshot -m region

# ── Wallpaper cycle ───────────────────────────────────────────────────────────
bind = $mod SHIFT, W, exec, swww img ~/.config/hypr/nyxus-wallpaper.png    --transition-type wipe --transition-duration 1.0
bind = $mod ALT,   1, exec, swww img ~/.config/hypr/nyxus-wallpaper.png    --transition-type fade --transition-duration 1.0
bind = $mod ALT,   2, exec, swww img ~/.config/hypr/nyxus-wallpaper-v2.png --transition-type fade --transition-duration 1.0
bind = $mod ALT,   3, exec, swww img ~/.config/hypr/nyxus-wallpaper-v3.png --transition-type fade --transition-duration 1.0
bind = $mod ALT,   4, exec, swww img ~/.config/hypr/nyxus-wallpaper-v4.png --transition-type fade --transition-duration 1.0
