# ─────────────────────────────────────────────────────────────────────────────
# NYXUS Hyprland Config — clean starter
# © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ─────────────────────────────────────────────────────────────────────────────

monitor=,preferred,auto,1

# ── Autostart ────────────────────────────────────────────────────────────────
exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle

# ── Input ────────────────────────────────────────────────────────────────────
input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0
    touchpad {
        natural_scroll = true
    }
}

# ── General ──────────────────────────────────────────────────────────────────
general {
    gaps_in  = 6
    gaps_out = 12
    border_size = 2

    # Active: neon purple gradient — NYXUS signature
    col.active_border   = rgba(c084fcee) rgba(7c3aedcc) 45deg
    # Inactive: near-black — disappears into background
    col.inactive_border = rgba(111111aa)

    layout = dwindle
    resize_on_border = true
}

# ── Decoration ───────────────────────────────────────────────────────────────
decoration {
    rounding = 4

    active_opacity   = 1.0
    inactive_opacity = 0.95

    blur {
        enabled = true
        size    = 4
        passes  = 2
    }

    shadow {
        enabled       = true
        range         = 20
        render_power  = 3
        color         = rgba(c084fc33)
        color_inactive = rgba(00000055)
    }
}

# ── Animations ───────────────────────────────────────────────────────────────
animations {
    enabled = true

    bezier = nyxus,  0.05, 0.9, 0.1, 1.05
    bezier = linear, 0.0,  0.0, 1.0, 1.0
    bezier = snap,   0.2,  1.0, 0.2, 1.0

    animation = windows,     1, 4, nyxus
    animation = windowsOut,  1, 3, default, popin 80%
    animation = border,      1, 8, default
    animation = borderangle, 1, 14, linear, loop
    animation = fade,        1, 5, default
    animation = workspaces,  1, 4, snap
}

# ── Layout ───────────────────────────────────────────────────────────────────
dwindle {
    pseudotile      = true
    preserve_split  = true
}

master {
    new_is_master = true
}

# ── Misc ─────────────────────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    disable_splash_rendering = true
    vfr = true
}

# ─────────────────────────────────────────────────────────────────────────────
# KEY BINDINGS
# ─────────────────────────────────────────────────────────────────────────────
$mod = SUPER

# ── Apps ─────────────────────────────────────────────────────────────────────
bind = $mod,       Return, exec, alacritty
bind = $mod,       D,      exec, rofi -show drun
bind = $mod,       E,      exec, nautilus

# ── Window management ────────────────────────────────────────────────────────
bind = $mod,       Q,      killactive
bind = $mod,       V,      togglefloating
bind = $mod,       P,      pseudo
bind = $mod,       J,      togglesplit
bind = $mod,       F,      fullscreen, 0
bind = $mod SHIFT, F,      fullscreen, 1
bind = $mod,       M,      exit

# ── Focus ────────────────────────────────────────────────────────────────────
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H,     movefocus, l
bind = $mod, L,     movefocus, r
bind = $mod, K,     movefocus, u
bind = $mod, J,     movefocus, d

# ── Move windows ─────────────────────────────────────────────────────────────
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d
bind = $mod SHIFT, H,     movewindow, l
bind = $mod SHIFT, L,     movewindow, r
bind = $mod SHIFT, K,     movewindow, u
bind = $mod SHIFT, J,     movewindow, d

# ── Resize ───────────────────────────────────────────────────────────────────
bind = $mod CTRL, left,  resizeactive, -40  0
bind = $mod CTRL, right, resizeactive,  40  0
bind = $mod CTRL, up,    resizeactive,   0 -40
bind = $mod CTRL, down,  resizeactive,   0  40

# ── Workspaces ───────────────────────────────────────────────────────────────
bind = $mod,       1, workspace, 1
bind = $mod,       2, workspace, 2
bind = $mod,       3, workspace, 3
bind = $mod,       4, workspace, 4
bind = $mod,       5, workspace, 5
bind = $mod,       6, workspace, 6
bind = $mod,       7, workspace, 7
bind = $mod,       8, workspace, 8
bind = $mod,       9, workspace, 9
bind = $mod,       0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# ── Mouse ────────────────────────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Media / Volume ───────────────────────────────────────────────────────────
bind = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,         exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86AudioMicMute,      exec, wpctl set-mute   @DEFAULT_AUDIO_SOURCE@ toggle
bind = , XF86AudioPlay,         exec, playerctl play-pause
bind = , XF86AudioNext,         exec, playerctl next
bind = , XF86AudioPrev,         exec, playerctl previous

# ── Brightness ───────────────────────────────────────────────────────────────
bind = , XF86MonBrightnessUp,   exec, brightnessctl set 10%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# ── Screenshot ───────────────────────────────────────────────────────────────
bind = ,       Print, exec, hyprshot -m output
bind = $mod,   Print, exec, hyprshot -m region
bind = $mod SHIFT, S, exec, hyprshot -m region
