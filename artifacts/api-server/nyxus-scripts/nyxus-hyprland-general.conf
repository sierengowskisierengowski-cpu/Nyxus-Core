# ============================================================
#  NYXUS — Window edges / gaps / rounding (DARK MIRROR rev 2026-05-07)
#  ~/.config/hypr/conf.d/nyxus-hyprland-general.conf
#
#  r2 · 2026.05.07 — DARK MIRROR active border (white→black).
#
#  ── ACTIVE BORDER ─────────────────────────────────────────
#  Pure white → off-white → black gradient. Reads as starlight
#  rim-light on the focused window's top-left edge fading into
#  inky black on the bottom-right. Matches the dark-mirror glass
#  treatment now applied to every NYXUS app + flyout via
#  nyxus_chrome.py r12.
#
#  ── INACTIVE BORDER ───────────────────────────────────────
#  Faded off-white → faded black, low alpha so unfocused windows
#  recede.
#
#  ── REVERT IF YOU HATE IT ─────────────────────────────────
#    rm ~/.config/hypr/conf.d/nyxus-hyprland-general.conf
#    hyprctl reload
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

general {
    # DARK MIRROR rim — pure white at the highlight, deep black at the shadow.
    col.active_border   = rgba(ffffffff) rgba(e8edf5cc) rgba(0a0a0aff) 135deg
    col.inactive_border = rgba(e8edf555) rgba(0a0a0a66) 135deg

    border_size         = 2            # 2px so highlight + shadow both visible
    gaps_in             = 10           # space between tiled windows
    gaps_out            = 20           # space to monitor edge
    layout              = dwindle      # keeps existing tiling behavior
    resize_on_border    = true
}

decoration {
    rounding            = 15           # frosted-card corner radius
    # NOTE: blur params live in nyxus-hyprland-blur.conf (don't dupe here)

    # Drop shadow stays ink-black (real shadow on the wallpaper, not bloom).
    shadow {
        enabled        = true
        range          = 36
        render_power   = 3
        sharp          = false
        color          = rgba(00000099)
        color_inactive = rgba(00000033)
        offset         = 2 4
    }
}
