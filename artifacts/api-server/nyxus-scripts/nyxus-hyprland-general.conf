# ============================================================
#  NYXUS — Window edges / gaps / rounding (FEATURE 5 of frosted-white)
#  ~/.config/hypr/conf.d/nyxus-hyprland-general.conf
#
#  r1 · 2026.05.05 — Seattle Frost active edges
#
#  REPLACES the hot-pink Hyprland default active border with the same
#  charcoal-pencil ink used inside chrome.py r11. Combined with thinner
#  border (1px instead of 2-3) + 15px rounding + 10/20 gaps, every
#  window now looks like a sketched frosted card on the wallpaper.
#
#  Sourced by hyprland.conf via:
#      source = ~/.config/hypr/conf.d/nyxus-hyprland-general.conf
#
#  ── REVERT IF YOU HATE IT ──────────────────────────────────
#    rm ~/.config/hypr/conf.d/nyxus-hyprland-general.conf
#    hyprctl reload
#  Hyprland falls back to whatever your main hyprland.conf set.
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

general {
    # Frost-pencil edges — was hot-pink/magenta
    col.active_border   = rgba(313131cc) rgba(1a1816cc) 45deg
    col.inactive_border = rgba(d1d1d166) rgba(a8a8a833) 45deg

    border_size         = 1            # thin pencil line (was 2–3)
    gaps_in             = 10           # space between tiled windows
    gaps_out            = 20           # space to monitor edge
    layout              = dwindle      # keeps existing tiling behavior
    resize_on_border    = true
}

decoration {
    rounding            = 15           # frosted-card corner radius
    # NOTE: blur params live in nyxus-hyprland-blur.conf (don't dupe here)
}
