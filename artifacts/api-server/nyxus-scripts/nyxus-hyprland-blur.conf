# ============================================================
#  NYXUS — Hyprland compositor blur (FEATURE 1 of frosted-white)
#  ~/.config/hypr/conf.d/nyxus-hyprland-blur.conf
#
#  Sourced by hyprland.conf via:
#      source = ~/.config/hypr/conf.d/nyxus-hyprland-blur.conf
#
#  ── HISTORY / WHY THIS FILE IS SO SMALL ────────────────────
#  The previous nyxus-seattle-frost.conf set:
#      decoration { brightness = 1.4 }
#      windowrulev2 = opacity 0.85 0.70, ...
#  brightness > 1.0 multiplies every pixel including white,
#  which whitewashed the entire screen. That file was deleted.
#
#  This file enables JUST the compositor blur kernel — nothing
#  else. With no per-window opacity rules in place yet, you
#  will NOT visually see blur until feature 2 (opacity rules)
#  ships. Enabling the kernel here first proves Hyprland will
#  parse a decoration block without exploding.
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

decoration {
    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = false
    }
}
