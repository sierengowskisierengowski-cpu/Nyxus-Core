# ============================================================
#  NYXUS — Hyprland compositor blur (FEATURE 1 of frosted-white)
#  ~/.config/hypr/conf.d/nyxus-hyprland-blur.conf
#
#  r2 · 2026.05.05 — Seattle Frost spec values
#
#  ── HISTORY / WHY brightness=1.4 IS NOW SAFE ───────────────
#  The previous nyxus-seattle-frost.conf set brightness=1.4
#  WITHOUT cream-frosted app backgrounds, so the multiplier
#  whitewashed every pixel. With chrome.py r11's cream/fog/tar
#  CSS in place, the brightness multiplier hits already-cream
#  panels and produces the milk-glass look the spec wants.
#
#  ── REVERT IF SCREEN GOES WHITE ────────────────────────────
#    sudo cp /home/nyx/.config/hypr/conf.d/nyxus-hyprland-blur.conf{,.bak}
#    sudo sed -i 's/brightness = 1.4/brightness = 1.0/' \
#       /home/nyx/.config/hypr/conf.d/nyxus-hyprland-blur.conf
#    hyprctl reload
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

decoration {
    blur {
        enabled = true
        size = 12              # was 6 — thicker glass
        passes = 4             # was 2 — smoother frosting
        new_optimizations = true
        ignore_opacity = false
        brightness = 1.4       # NEW — milk-white tint behind windows
        vibrancy = 0.2         # NEW — keep colors from leaking through
        noise = 0.04           # NEW — etched-glass grain (breaks up sharp wallpaper edges)
    }
}
