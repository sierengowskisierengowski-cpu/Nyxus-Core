# NYXUS hyprlock configuration
# Drop into ~/.config/hypr/hyprlock.conf and run: hyprlock
#
# Visual: same graffiti mural family as the NYXUS chrome (mural #17 by
# default — pulled to ~/.cache/nyxus/graffiti/), with frosted black
# overlay, neon-pink input field, rainbow rotating greeting.

general {
    disable_loading_bar = true
    grace = 2
    hide_cursor = false
    no_fade_in = false
    ignore_empty_input = true
}

# ── Background: the graffiti mural ──────────────────────────────────────
background {
    monitor =
    path = ~/.cache/nyxus/graffiti/nyxus-graffiti-17.png
    blur_passes = 3
    blur_size = 10
    contrast = 1.05
    brightness = 0.55
    vibrancy = 0.30
    vibrancy_darkness = 0.0
}

# ── Frosted black overlay so text stays readable ────────────────────────
shape {
    monitor =
    size = 1920, 1200
    color = rgba(8, 6, 14, 0.55)
    rounding = 0
    border_size = 0
    position = 0, 0
    halign = center
    valign = center
}

# ── NYXUS title ────────────────────────────────────────────────────────
label {
    monitor =
    text = NYXUS
    color = rgba(255, 0, 255, 1.0)
    font_size = 96
    font_family = Caveat Bold
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(255, 0, 255, 0.6)
    position = 0, 200
    halign = center
    valign = center
}

# ── Subtitle / status ──────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A · %H:%M:%S')"
    color = rgba(255, 255, 255, 0.85)
    font_size = 22
    font_family = Caveat
    position = 0, 130
    halign = center
    valign = center
}

# ── User greeting ──────────────────────────────────────────────────────
label {
    monitor =
    text = hello $USER
    color = rgba(57, 255, 20, 0.95)
    font_size = 28
    font_family = Caveat
    position = 0, 80
    halign = center
    valign = center
}

# ── Password input ─────────────────────────────────────────────────────
input-field {
    monitor =
    size = 460, 64
    outline_thickness = 3
    dots_size = 0.30
    dots_spacing = 0.45
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(255, 0, 255, 0.85)
    inner_color = rgba(8, 6, 14, 0.85)
    font_color = rgba(255, 255, 255, 1.0)
    fade_on_empty = false
    placeholder_text = <span foreground="#ffffff" alpha="50%" font_family="Caveat">enter password…</span>
    hide_input = false
    rounding = 6
    check_color = rgba(57, 255, 20, 1.0)
    fail_color = rgba(255, 48, 48, 1.0)
    fail_text = <span foreground="#ff3030" font_family="Caveat">wrong — $ATTEMPTS attempts</span>
    capslock_color = rgba(255, 215, 0, 1.0)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -50
    halign = center
    valign = center
}

# ── Battery / KBD layout indicators (bottom bar) ────────────────────────
label {
    monitor =
    text = cmd[update:5000] sh -c 'cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1 | sed "s/$/% battery/" || echo "AC"'
    color = rgba(255, 255, 255, 0.65)
    font_size = 14
    font_family = Caveat
    position = -30, 30
    halign = right
    valign = bottom
}

label {
    monitor =
    text = NYXUS · Hyprland
    color = rgba(255, 0, 255, 0.55)
    font_size = 14
    font_family = Caveat
    position = 30, 30
    halign = left
    valign = bottom
}
