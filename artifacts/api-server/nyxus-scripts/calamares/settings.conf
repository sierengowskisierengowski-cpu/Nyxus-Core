# Calamares system configuration for NYXUS installer.
#
# This file is staged to /etc/calamares/settings.conf on the live ISO.
# It defines the install module sequence and pins the active branding
# to the "nyxus" component shipped under
# /etc/calamares/branding/nyxus/.
#
# After Calamares finishes its built-in stages we run a single shell
# job pointing at /usr/local/sbin/nyxus-postinstall.sh which performs
# the NYXUS-specific finalization (enable user services, regenerate
# initramfs, prime first-boot wizard, etc).
#
# © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED

---
modules-search: [ local, /usr/lib/calamares/modules ]

instances:
  - id:     nyxus_postinstall
    module: shellprocess
    config: shellprocess_nyxus.conf

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - users
      - networkcfg
      - hwclock
      - services-systemd
      - grubcfg
      - bootloader
      - shellprocess@nyxus_postinstall
      - umount
  - show:
      - finished

branding:           nyxus
prompt-install:     true
dont-chroot:        false
oem-setup:          false
disable-cancel:     false
disable-cancel-during-exec: false
