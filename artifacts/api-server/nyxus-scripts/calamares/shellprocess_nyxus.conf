# Calamares shellprocess module config — runs nyxus-postinstall.sh
# inside the new system root after install.
#
# Legacy compatibility copy. Canonical module path is:
#   calamares/modules/shellprocess_nyxus.conf
# Keep this path for existing installers that still request
# calamares/shellprocess_nyxus.conf (r10 bootstrap clients and older).
# Remove only after those clients are retired.
#
# Calamares streams stdout/stderr to the install log
# (/var/log/Calamares.log) so failures surface to the user instead
# of being swallowed.
#
# © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED

---
dontChroot:   false
timeout:      900

script:
  - command:  "/usr/local/sbin/nyxus-postinstall.sh"
    timeout:  900
