# ============================================================
#  NYXUS — Window opacity (DARK MIRROR rev r30 · 2026-05-14)
#  ~/.config/hypr/conf.d/nyxus-hyprland-opacity.conf
#
#  rev r31 · 2026-05-17 — All rules use `windowrulev2`. The v1
#  `windowrule = RULE, class:REGEX` form mis-parses on Hyprland
#  0.50+ ("invalid field class:^...$: missing a value") because
#  `class:` matchers are only valid with the v2 keyword. The
#  previous comment claiming v2 was deprecated was backwards —
#  v1 is the one that was deprecated for matcher-style rules.
#
#  Wiki: https://wiki.hypr.land/Configuring/Window-Rules/
#
#  Uniform 0.92 / 0.78 (focused / unfocused) for ALL NYXUS apps
#  + flyout. Combined with nyxus_chrome.py transparent root +
#  dark-glass panels + Hyprland blur, every app reads as a
#  single piece of dark mirror floating above the wallpaper.
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

# -- Universal NYXUS class (catch-all) --
windowrulev2 = opacity 0.92 0.78, class:^([Nn]yxus.*)$

# -- io.nyxus.* / org.nyxus.* / app.nyxus.* GTK4 app_ids --
# Split into 3 flat rules — nested capture groups with escaped dots
# fail in the Hyprland 0.50+ regex engine.
windowrulev2 = opacity 0.92 0.78, class:^io\.nyxus\..*$
windowrulev2 = opacity 0.92 0.78, class:^org\.nyxus\..*$
windowrulev2 = opacity 0.92 0.78, class:^app\.nyxus\..*$

# -- 11 godsapp-family products + flyout (panel) (`home` excluded) --
windowrulev2 = opacity 0.92 0.78, class:^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather|panel|nyxus-panel)$

# -- Tooltips / popovers / dropdowns are layer-shell, not windows; --
# -- their alpha is set inside nyxus_chrome.py CHROME_CSS instead. --
