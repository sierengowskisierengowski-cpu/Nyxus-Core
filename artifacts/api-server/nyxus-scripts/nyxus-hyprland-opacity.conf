# ============================================================
#  NYXUS — Window opacity (DARK MIRROR rev 2026-05-07)
#  ~/.config/hypr/conf.d/nyxus-hyprland-opacity.conf
#
#  r5 · 2026.05.07 — Uniform 0.92 / 0.78 (focused / unfocused) for ALL
#                    NYXUS apps + flyout. No exceptions, no per-app tweaks.
#                    Combined with nyxus_chrome.py r12's transparent root
#                    + dark-glass panels + Hyprland blur, every app reads
#                    as a single piece of dark mirror floating above the
#                    wallpaper.
#
#  Class coverage:
#    org.nyxus.*        — every GTK4 app_id-registered NYXUS app
#    nyxus-*            — every helper class (notepad, stickies, sysmon...)
#    [Nn]yxus.*         — case-insensitive catch-all
#    The 11 godsapp-family product names (godsapp, home, intel, notepad,
#       passwords, phantom, sage, shield, start, studio, weather)
#    The flyout (panel)
#    nyxus-quicksettings, nyxus-launcher, nyxus-powermenu, nyxus-screensaver
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

# ── Universal NYXUS class (catch-all) ─────────────────────────────────────
windowrule {
    name = nyxus-universal-opacity
    match:class = ^([Nn]yxus.*)$
    opacity = 0.92 0.78
}

# ── io.nyxus.* / org.nyxus.* GTK4 app_ids ────────────────────────────────
# Repo ships both io.nyxus.* (sysmon, stickies, settings, weather, terminal,
# control, launcher, powermenu, screenshot, doctor) and org.nyxus.* (notes).
windowrule {
    name = ionyxus-opacity
    match:class = ^((io|org)\.nyxus\..*)$
    opacity = 0.92 0.78
}

# ── 11 godsapp-family products + flyout (panel) ───────────────────────────
# `home` excluded — it's pinned to workspace 0 by main hyprland.conf as
# the desktop dashboard and must not be float/sized like a regular app.
windowrule {
    name = godsapp-family-opacity
    match:class = ^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather|panel|nyxus-panel)$
    opacity = 0.92 0.78
}

# ── Tooltips / popovers / dropdowns are layer-shell, not windows;        ──
#    their alpha is set inside nyxus_chrome.py CHROME_CSS instead.        ──
