# ============================================================
#  NYXUS — Window opacity (DARK MIRROR rev 2026-05-07 r17)
#  ~/.config/hypr/conf.d/nyxus-hyprland-opacity.conf
#
#  r7 · 2026.05.07 — Use explicit `override` keyword form per the
#                    Hyprland wiki. Without `override`, opacity values
#                    stack multiplicatively across rules and the
#                    Hyprland 0.49+ unified `windowrule` parser was
#                    rejecting two-value `opacity X Y, class:...`
#                    with "invalid field class: missing a value".
#                    The `override` keyword forces ABSOLUTE values
#                    and disambiguates the rule for the parser.
#
#  Uniform 0.92 / 0.78 (focused / unfocused) for ALL NYXUS apps
#  + flyout. Combined with nyxus_chrome.py r12 transparent root
#  + dark-glass panels + Hyprland blur, every app reads as a
#  single piece of dark mirror floating above the wallpaper.
#
#  Wiki: https://wiki.hypr.land/Configuring/Basics/Window-Rules/
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

# -- Universal NYXUS class (catch-all) --
windowrule = opacity 0.92 override 0.78 override, class:^([Nn]yxus.*)$

# -- io.nyxus.* / org.nyxus.* / app.nyxus.* GTK4 app_ids --
# NOTE: Recent Hyprland (0.50+) parser fails on nested capture groups
# combined with escaped dots — `class:^((io|org|app)\.nyxus\..*)$` produces
# `invalid field class:... missing a value`. Splitting into three flat rules
# (one per app_id prefix) parses cleanly. Same effect, more readable.
windowrule = opacity 0.92 override 0.78 override, class:^io\.nyxus\..*$
windowrule = opacity 0.92 override 0.78 override, class:^org\.nyxus\..*$
windowrule = opacity 0.92 override 0.78 override, class:^app\.nyxus\..*$

# -- 11 godsapp-family products + flyout (panel) (`home` excluded) --
windowrule = opacity 0.92 override 0.78 override, class:^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather|panel|nyxus-panel)$

# -- Tooltips / popovers / dropdowns are layer-shell, not windows; --
# -- their alpha is set inside nyxus_chrome.py CHROME_CSS instead. --
