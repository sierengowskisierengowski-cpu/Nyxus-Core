# ============================================================
#  NYXUS — Notes & Notepad transparency (BLOCK SYNTAX)
#  ~/.config/hypr/conf.d/nyxus-hyprland-opacity.conf
#
#  r4 · 2026.05.05 — Add nyxus-notes (org.nyxus.notes) match
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

windowrule {
    name = nyxus-notes-opacity
    match:class = ^(org\.nyxus\.notes|nyxus-notes|notes)$
    opacity = 0.88 0.74
}

windowrule {
    name = nyxus-notepad-opacity
    match:class = ^(nyxus-notepad|notepad)$
    opacity = 0.85 0.70
}
