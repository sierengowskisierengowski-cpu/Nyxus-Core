#  NYXUS — Window opacity (DARK MIRROR rev r22c · 2026-05-09)
#  ~/.config/hypr/conf.d/nyxus-hyprland-opacity.conf
#
#  rev r22c · 2026-05-09 — Per Hyprland wiki:
#    `opacity FLOAT [FLOAT] [FLOAT] [override]`
#  `override` is ONE keyword at the END of the rule, NOT after
#  each value. The earlier rev r22 form (`opacity X override Y
#  override`) was rejected by the parser with "invalid field
#  class=... missing a value" on every rule (260+ errors).
#  This rev uses the correct single-trailing-`override` form.
#
#  Wiki: https://wiki.hypr.land/Configuring/Basics/Window-Rules/
#
#  Uniform 0.92 / 0.78 (focused / unfocused) for ALL NYXUS apps
#  + flyout. Combined with nyxus_chrome.py transparent root +
#  dark-glass panels + Hyprland blur, every app reads as a
#  single piece of dark mirror floating above the wallpaper.
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

# rev r26b · 2026-05-09 — switched from `windowrule` → `windowrulev2`.
# In Hyprland 0.50+, the merged `windowrule` keyword stopped accepting
# `class:` / `title:` matchers in the second comma field — it was
# parsing them as bare field names ("invalid field class:^...$ : missing
# a value", 260+ errors visible as a red config-error overlay at the top
# of the screen). `windowrulev2` is the legacy-but-still-supported form
# that explicitly takes `class:` / `title:` matchers and is the documented
# correct verb for opacity rules with regex matchers.

# -- Universal NYXUS class (catch-all) --
windowrulev2 = opacity 0.92 0.78 override, class:^([Nn]yxus.*)$

# -- io.nyxus.* / org.nyxus.* / app.nyxus.* GTK4 app_ids --
# Split into 3 flat rules — nested capture groups with escaped dots
# fail in the Hyprland 0.50+ regex engine.
windowrulev2 = opacity 0.92 0.78 override, class:^io\.nyxus\..*$
windowrulev2 = opacity 0.92 0.78 override, class:^org\.nyxus\..*$
windowrulev2 = opacity 0.92 0.78 override, class:^app\.nyxus\..*$

# -- 11 godsapp-family products + flyout (panel) (`home` excluded) --
windowrulev2 = opacity 0.92 0.78 override, class:^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather|panel|nyxus-panel)$

# -- Tooltips / popovers / dropdowns are layer-shell, not windows; --
# -- their alpha is set inside nyxus_chrome.py CHROME_CSS instead. --
