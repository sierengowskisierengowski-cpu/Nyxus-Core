# ============================================================
#  NYXUS — Per-window opacity (FEATURE 2 of frosted-white)
#  ~/.config/hypr/conf.d/nyxus-hyprland-opacity.conf
#
#  Sourced by hyprland.conf via:
#      source = ~/.config/hypr/conf.d/nyxus-hyprland-opacity.conf
#
#  Rolls out opacity ONE APP AT A TIME so any contrast / readability
#  problem is caught before it spreads to all 11 apps.
#
#  Format: windowrulev2 = opacity ACTIVE INACTIVE, class:REGEX
#    ACTIVE   = alpha when window is focused
#    INACTIVE = alpha when window is unfocused
#  Values are GENTLE (0.92/0.88), NOT the 0.85/0.70 from the old
#  Seattle Frost conf that combined with brightness=1.4 to whitewash.
#
#  CANARY: nyxus-notepad only. If readable + blur visible behind it,
#  feature 3 (chrome.py rgba background) ships next, then we add the
#  remaining 10 apps to this rule's class regex.
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

# Notepad canary — match both possible window classes
windowrulev2 = opacity 0.92 0.88, class:^(nyxus-notepad|notepad)$
