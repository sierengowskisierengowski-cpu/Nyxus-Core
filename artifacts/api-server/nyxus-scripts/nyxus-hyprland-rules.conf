# ============================================================
#  NYXUS — Hyprland window rules  (windowrulev2 syntax)
#  ~/.config/hypr/conf.d/nyxus-windowrules.conf
#
#  Sourced by hyprland.conf via:
#      source = ~/.config/hypr/conf.d/nyxus-windowrules.conf
#
#  v2 syntax fixes the "invalid field float: missing a value"
#  parser error from older `windowrule = ...` style. Modern
#  Hyprland (0.41+) requires windowrulev2 for rule parsing.
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

# ── App windows: float at sensible default size, centered ───────────────────
windowrulev2 = float, class:^([Nn]yxus.*)$
windowrulev2 = center, class:^([Nn]yxus.*)$

windowrulev2 = float, class:^(godsapp|home|weather|notepad|passwords|intel|sage|studio|shield)$
windowrulev2 = center, class:^(godsapp|home|weather|notepad|passwords|intel|sage|studio|shield)$

# ── Popup panels: float, fly out from the bottom waybar ────────────────────
windowrulev2 = float,    class:^(nyxus-(start|panel|notifications|settings|quicksettings|powermenu))$
windowrulev2 = noborder, class:^(nyxus-(start|panel|notifications|settings|quicksettings|powermenu))$
windowrulev2 = pin,      class:^(nyxus-(start|panel|notifications|settings|quicksettings|powermenu))$
windowrulev2 = size 380 480, class:^(nyxus-(start|panel|notifications|settings|quicksettings|powermenu))$
windowrulev2 = minsize 280 200, class:^(nyxus-(start|panel|notifications|settings|quicksettings|powermenu))$
windowrulev2 = move 12 100%-720,        class:^(nyxus-(start|notifications))$
windowrulev2 = move 100%-472 100%-720,  class:^(nyxus-(panel|settings|quicksettings|powermenu))$

# Same flyout treatment for io.nyxus.* style window classes
windowrulev2 = float,    class:^(io\.nyxus\.(quicksettings|settings|powermenu|notifications))$
windowrulev2 = noborder, class:^(io\.nyxus\.(quicksettings|settings|powermenu|notifications))$
windowrulev2 = pin,      class:^(io\.nyxus\.(quicksettings|settings|powermenu|notifications))$
windowrulev2 = size 380 480, class:^(io\.nyxus\.(quicksettings|settings|powermenu|notifications))$
windowrulev2 = minsize 280 200, class:^(io\.nyxus\.(quicksettings|settings|powermenu|notifications))$
windowrulev2 = move 100%-472 100%-720, class:^(io\.nyxus\.(quicksettings|settings|powermenu|notifications))$

# ── Transparency / blur: let Hyprland render frosted glass on every NYXUS app
# Surface is transparent in CSS — Hyprland blur passes paint the frosted
# glass over the desktop wallpaper. opacity 1.0 1.0 prevents the
# inactive-dim regression that would wash out backgrounded apps.
windowrulev2 = opacity 1.0 1.0,  class:^([Nn]yxus.*)$
windowrulev2 = opacity 1.0 1.0,  class:^(godsapp|home|weather|notepad|passwords|intel|sage|studio|shield)$
windowrulev2 = opacity 1.0 1.0,  class:^(io\.nyxus\..*)$
windowrulev2 = rounding 15,      class:^([Nn]yxus.*)$
windowrulev2 = rounding 15,      class:^(io\.nyxus\..*)$
windowrulev2 = rounding 15,      class:^(godsapp|home|weather|notepad|passwords|intel|sage|studio|shield)$

# ── Screensaver + demon-wake: fullscreen, no decorations, no animations ────
windowrulev2 = fullscreen, class:^(app\.nyxus\.(Screensaver|DemonWake))$
windowrulev2 = noborder,   class:^(app\.nyxus\.(Screensaver|DemonWake))$
windowrulev2 = noanim,     class:^(app\.nyxus\.(Screensaver|DemonWake))$
windowrulev2 = nofocus,    class:^(app\.nyxus\.Screensaver)$
windowrulev2 = pin,        class:^(app\.nyxus\.DemonWake)$
windowrulev2 = stayfocused, class:^(app\.nyxus\.DemonWake)$
