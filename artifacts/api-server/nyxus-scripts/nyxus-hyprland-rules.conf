# ── App windows: float at sensible default size, centered ───────────────────
# Matches every NYXUS GTK4 app whose window class begins with "nyxus" or
# matches one of the named godsapp-family launchers. Float prevents the
# tile layout from stretching them to fill the workspace; size pins the
# default geometry; center places them on the active monitor.
windowrule = float, class:^([Nn]yxus.*)$
windowrule = size 900 650, class:^([Nn]yxus.*)$
windowrule = center, class:^([Nn]yxus.*)$

windowrule = float, class:^(godsapp|home|weather|notepad|passwords|intel|sage|studio|shield)$
windowrule = size 900 650, class:^(godsapp|home|weather|notepad|passwords|intel|sage|studio|shield)$
windowrule = center, class:^(godsapp|home|weather|notepad|passwords|intel|sage|studio|shield)$

# ── Popup panels: float, fly out from the bottom waybar ────────────────────
# The 4 bottom-bar buttons (start, panel, notifications, settings) plus the
# auxiliary popups (quicksettings, powermenu) all fly out from above the
# waybar (which is 40px tall). float prevents tile-stretch; noborder keeps
# them looking like flyouts not normal windows; size 460x680 + a position
# rule anchors each to the corner closest to its waybar button.
windowrule = float,    class:^(nyxus-(start|panel|notifications|settings|quicksettings|powermenu))$
windowrule = noborder, class:^(nyxus-(start|panel|notifications|settings|quicksettings|powermenu))$
windowrule = pin,      class:^(nyxus-(start|panel|notifications|settings|quicksettings|powermenu))$
windowrule = size 460 680, class:^(nyxus-(start|panel|notifications|settings|quicksettings|powermenu))$
# Anchor: start + notifications fly out from the LEFT side of the waybar
windowrule = move 12 100%-720,        class:^(nyxus-(start|notifications))$
# Anchor: panel + settings + quicksettings fly out from the RIGHT side
windowrule = move 100%-472 100%-720,  class:^(nyxus-(panel|settings|quicksettings|powermenu))$

# Same flyout treatment for the popup classes that use io.nyxus.* style IDs
# (nyxus_quicksettings.py, nyxus_settings.py, nyxus_terminal.py register as
# io.nyxus.<name>; without these rules they would not fly out properly).
windowrule = float,    class:^(io\.nyxus\.(quicksettings|settings|powermenu|notifications))$
windowrule = noborder, class:^(io\.nyxus\.(quicksettings|settings|powermenu|notifications))$
windowrule = pin,      class:^(io\.nyxus\.(quicksettings|settings|powermenu|notifications))$
windowrule = size 460 680, class:^(io\.nyxus\.(quicksettings|settings|powermenu|notifications))$
windowrule = move 100%-472 100%-720, class:^(io\.nyxus\.(quicksettings|settings|powermenu|notifications))$

# ── Transparency / blur: let Hyprland render frosted glass on every NYXUS *
# app. r4: chrome.py makes the window surface fully transparent — Hyprland *
# blur passes turn that into the GodsApp-style frosted glass over the      *
# desktop wallpaper. opacity 1.0 1.0 prevents the inactive-dim regression  *
# that would make backgrounded apps look washed out.
windowrule = opacity 1.0 1.0,  class:^([Nn]yxus.*)$
windowrule = opacity 1.0 1.0,  class:^(godsapp|home|weather|notepad|passwords|intel|sage|studio|shield)$
windowrule = opacity 1.0 1.0,  class:^(io\.nyxus\..*)$
windowrule = rounding 14,      class:^([Nn]yxus.*)$
windowrule = rounding 14,      class:^(io\.nyxus\..*)$
windowrule = rounding 14,      class:^(godsapp|home|weather|notepad|passwords|intel|sage|studio|shield)$

# ── Screensaver + demon-wake: fullscreen, no decorations, no animations ────
# These overlays must own the entire monitor. noanim avoids the slide-in
# transition that would expose the desktop for ~150ms before they cover it.
windowrule = fullscreen, class:^(app\.nyxus\.(Screensaver|DemonWake))$
windowrule = noborder, class:^(app\.nyxus\.(Screensaver|DemonWake))$
windowrule = noanim, class:^(app\.nyxus\.(Screensaver|DemonWake))$
windowrule = nofocus, class:^(app\.nyxus\.Screensaver)$
windowrule = pin, class:^(app\.nyxus\.DemonWake)$
windowrule = stayfocused, class:^(app\.nyxus\.DemonWake)$
