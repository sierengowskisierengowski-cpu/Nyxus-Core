# ── App windows: float at sensible default size, centered ───────────────────
# Matches every NYXUS GTK4 app whose window class begins with "nyxus" or
# matches one of the named godsapp-family launchers. Float prevents the
# tile layout from stretching them to fill the workspace; size pins the
# default geometry; center places them on the active monitor.
windowrule = float, class:^([Nn]yxus.*)$
windowrule = size 900 650, class:^([Nn]yxus.*)$
windowrule = center, class:^([Nn]yxus.*)$

windowrule = float, class:^(godsapp|home|weather|notepad|passwords|intel|sage|studio|shield)$
windowrule = size 900 650, class:^(godsapp|home|weather|notepad|passwords|intel|sage|studio|shield)$
windowrule = center, class:^(godsapp|home|weather|notepad|passwords|intel|sage|studio|shield)$

# ── Popup panels: float, but keep their designed dimensions ────────────────
# Start menu, panel, notifications popup, settings — these set their own
# geometry intentionally; just float them so they don't get tile-stretched.
windowrule = float, class:^(nyxus-(start|panel|notifications|settings|quicksettings|powermenu))$

# ── Screensaver + demon-wake: fullscreen, no decorations, no animations ────
# These overlays must own the entire monitor. noanim avoids the slide-in
# transition that would expose the desktop for ~150ms before they cover it.
windowrule = fullscreen, class:^(app\.nyxus\.(Screensaver|DemonWake))$
windowrule = noborder, class:^(app\.nyxus\.(Screensaver|DemonWake))$
windowrule = noanim, class:^(app\.nyxus\.(Screensaver|DemonWake))$
windowrule = nofocus, class:^(app\.nyxus\.Screensaver)$
windowrule = pin, class:^(app\.nyxus\.DemonWake)$
windowrule = stayfocused, class:^(app\.nyxus\.DemonWake)$
