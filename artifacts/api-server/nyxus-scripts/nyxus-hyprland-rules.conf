# ============================================================
#  NYXUS — Hyprland window rules
#  ~/.config/hypr/conf.d/nyxus-windowrules.conf
#
#  r4 · 2026.05.05
#  Hybrid: block syntax for value-bearing rules (size, workspace,
#  opacity); windowrulev2 inline for valueless rules (float,
#  center) which Hyprland 0.54.3 rejects inside blocks with
#  "missing a value" errors.
#
#  windowrulev2 emits deprecation warnings (yellow) but rules
#  function correctly. Block syntax for unsupported rule types
#  emits hard errors (red). We accept the warnings.
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

# ── NYXUS class apps (anything starting with "nyxus") ──────────────────────
windowrule   = float, class:^([Nn]yxus.*)$
windowrule   = center, class:^([Nn]yxus.*)$

windowrule {
    name = nyxus-class-size
    match:class = ^([Nn]yxus.*)$
    size = 900 650
}

# ── godsapp-family launchers (named classes) ───────────────────────────────
windowrule   = float, class:^(godsapp|home|weather|notepad|notes|passwords|intel|sage|studio|shield)$
windowrule   = center, class:^(godsapp|home|weather|notepad|notes|passwords|intel|sage|studio|shield)$

windowrule {
    name = godsapp-size
    match:class = ^(godsapp|home|weather|notepad|notes|passwords|intel|sage|studio|shield)$
    size = 900 650
}

# ── org.nyxus.* application IDs (GTK4 app_id) ──────────────────────────────
windowrule   = float,  class:^(org\.nyxus\..*)$
windowrule   = center, class:^(org\.nyxus\..*)$

windowrule {
    name = orgnyxus-size
    match:class = ^(org\.nyxus\..*)$
    size = 900 650
}

# ── NYXUS Home (pinned to workspace 0, no float/size override) ─────────────
# Defined in main hyprland.conf at lines 23–32; do not duplicate here.
