# ============================================================
#  NYXUS — Hyprland window rules (DARK MIRROR rev 2026-05-07 r16)
#  ~/.config/hypr/conf.d/nyxus-hyprland-rules.conf
#
#  r7 · 2026-05-10 — Mixed-syntax reality: in Hyprland 0.51+ the
#                    unified `windowrule = RULE, class:REGEX` form
#                    works for SIMPLE rules (float, center, size,
#                    pin, workspace) — that's what this file uses.
#
#                    BUT the same form CHOKES on opacity-with-override:
#                    `windowrule = opacity X Y override, class:...`
#                    is mis-parsed as "invalid field class:^...$:
#                    missing a value" (260+ red errors). For opacity
#                    rules ONLY, use the legacy `windowrulev2 =`
#                    keyword (see nyxus-hyprland-opacity.conf rev r27).
#
#                    DO NOT "modernize" the opacity file back to
#                    `windowrule` — it will break the same way again.
#
#  All 11 godsapp-family apps + the flyout (panel) + the catch-alls
#  float, center, and size to a consistent 900x650.
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

# -- NYXUS class apps (anything starting with "nyxus") --
windowrule = float,         class:^([Nn]yxus.*)$
windowrule = center,        class:^([Nn]yxus.*)$
windowrule = size 900 650,  class:^([Nn]yxus.*)$

# -- 11 godsapp-family product launchers (`home` excluded — desktop dashboard) --
windowrule = float,         class:^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather)$
windowrule = center,        class:^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather)$
windowrule = size 900 650,  class:^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather)$

# -- io.nyxus.* / org.nyxus.* / app.nyxus.* application IDs (GTK4 app_id) --
windowrule = float,         class:^((io|org|app)\.nyxus\..*)$
windowrule = center,        class:^((io|org|app)\.nyxus\..*)$
windowrule = size 900 650,  class:^((io|org|app)\.nyxus\..*)$

# -- The flyout (panel) — float, pin to right edge, fixed 460x680 --
windowrule = float,         class:^(panel|nyxus-panel)$
windowrule = pin,           class:^(panel|nyxus-panel)$
windowrule = size 460 680,  class:^(panel|nyxus-panel)$

# -- NYXUS Home (pinned to workspace 0 by main hyprland.conf; no overrides here) --
