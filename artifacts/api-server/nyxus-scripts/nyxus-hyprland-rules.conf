# ============================================================
#  NYXUS — Hyprland window rules (DARK MIRROR rev 2026-05-07 r16)
#  ~/.config/hypr/conf.d/nyxus-hyprland-rules.conf
#
#  r11 · 2026-05-10 — DEFINITIVE Hyprland 0.54.3 reality, proven by
#                     four `hyprctl configerrors` round-trips on a
#                     live MSI GS77. Stop flipping. Read carefully:
#
#                       * `windowrule = RULE, class:REGEX`
#                         → DOES NOT PARSE. Throws "invalid field
#                         RULE: missing a value" cascading 50+ red
#                         errors on the on-screen Hyprland overlay.
#                         Genuinely broken in 0.54.3 hyprlang for
#                         class-matched rules. NEVER use this form.
#
#                       * `windowrule = RULE, class:REGEX`
#                         → WORKS. Hyprland prints a "windowrule
#                         is deprecated" line into `configerrors`
#                         (forward-looking warning for the 0.55+
#                         Lua migration), but the rules ARE applied
#                         and the on-screen error overlay STAYS
#                         CLEAN. This is the form to use.
#
#                     Same logic applies to nyxus-hyprland-opacity
#                     and the per-app overrides in this file. Keep
#                     EVERYTHING on `windowrule =` until we
#                     migrate to Hyprland 0.55+ (which means a
#                     full lua rewrite anyway). LOCKED. r11 final.
#
#  All 11 godsapp-family apps + the flyout (panel) + the catch-alls
#  float, center, and size to a consistent 900x650.
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

# -- NYXUS class apps (anything starting with "nyxus") --
windowrulev2 = float, class:^([Nn]yxus.*)$
windowrulev2 = center, class:^([Nn]yxus.*)$
windowrulev2 = size 900 650, class:^([Nn]yxus.*)$

# -- 11 godsapp-family product launchers (`home` excluded — desktop dashboard) --
windowrulev2 = float, class:^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather)$
windowrulev2 = center, class:^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather)$
windowrulev2 = size 900 650, class:^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather)$

# -- io.nyxus.* / org.nyxus.* / app.nyxus.* application IDs (GTK4 app_id) --
windowrulev2 = float, class:^((io|org|app)\.nyxus\..*)$
windowrulev2 = center, class:^((io|org|app)\.nyxus\..*)$
windowrulev2 = size 900 650, class:^((io|org|app)\.nyxus\..*)$

# -- The flyout (panel) — float, pin to right edge, fixed 460x680 --
windowrulev2 = float, class:^(panel|nyxus-panel)$
windowrulev2 = pin, class:^(panel|nyxus-panel)$
windowrulev2 = size 460 680, class:^(panel|nyxus-panel)$

# -- NYXUS Home (pinned to workspace 0 by main hyprland.conf; no overrides here) --

# ============================================================
#  PER-APP SIZE OVERRIDES (rev r8 · 2026-05-10)
#  Migrated out of main hyprland.conf where the unified
#  `windowrule =` form was misparsing `bordersize N` and
#  cascading 30+ "invalid field" errors on screen.
#  Using `windowrule =` here — the legacy keyword that
#  parses cleanly on Hyprland 0.51-0.54.x.
#  These OVERRIDE the catch-all 900x650 above for apps
#  that need different dimensions.
# ============================================================

# -- NYXUS SysMon (1280x800, bordered) --
windowrulev2 = size 1280 800, class:^(io\.nyxus\.sysmon)$
windowrulev2 = bordersize 1, class:^(io\.nyxus\.sysmon)$

# -- NYXUS Control (1280x800, bordered) --
windowrulev2 = size 1280 800, class:^(io\.nyxus\.control)$
windowrulev2 = bordersize 1, class:^(io\.nyxus\.control)$

# -- NYXUS Notepad (compact 760x540) --
windowrulev2 = size 760 540, class:^(io\.nyxus\.notepad)$

# -- NYXUS Stickies (1280x800, bordered) --
windowrulev2 = size 1280 800, class:^(io\.nyxus\.stickies)$
windowrulev2 = bordersize 1, class:^(io\.nyxus\.stickies)$

# -- NYXUS Weather (380x560 widget, pinned top-left) --
windowrulev2 = size 380 560, class:^(io\.nyxus\.weather)$
windowrulev2 = pin, class:^(io\.nyxus\.weather)$
windowrulev2 = move 20 100, class:^(io\.nyxus\.weather)$

# -- NYXUS Terminal (1280x800, bordered) --
windowrulev2 = size 1280 800, class:^(io\.nyxus\.terminal)$
windowrulev2 = bordersize 1, class:^(io\.nyxus\.terminal)$

# -- NYXUS Settings (1280x800, bordered) --
windowrulev2 = size 1280 800, class:^(io\.nyxus\.settings)$
windowrulev2 = bordersize 1, class:^(io\.nyxus\.settings)$
