# ============================================================================
# NYXUS — Hyprland window rules
# © 2026 Joseph Sierengowski — NYX-J5W-2026-SIERENGOWSKI-LOCKED
#
# Forces every NYXUS GTK app to open as a FLOATING window at a sensible
# small size, instead of being tile-stretched to fill the whole workspace.
# Pairs with chrome.py's set_default_size(900, 650) — without these rules,
# Hyprland's default tile mode would still fill the screen regardless of
# what size the app asks for.
#
# Drop-in usage (auto-installed by nyxus-resync-all.sh into ~/.config/hypr/
# conf.d/nyxus-windowrules.conf, then sourced by hyprland.conf via the
# resync script's `source = ~/.config/hypr/conf.d/nyxus-windowrules.conf`
# line append).
# ============================================================================

# ── Float every NYXUS GTK app ──────────────────────────────────────────────
windowrulev2 = float,        class:^([Nn]yxus.*)$
windowrulev2 = float,        title:^(NYXUS.*)$
windowrulev2 = float,        class:^(godsapp|sage|studio|shield|intel)$
windowrulev2 = float,        class:^(nyxus-(home|weather|notepad|passwords|godsapp|intel|sage|studio|shield|store|stickies|sysmon|widgets))$

# ── Default size on first map (matches chrome.py policy) ───────────────────
windowrulev2 = size 900 650, class:^([Nn]yxus.*)$
windowrulev2 = size 900 650, class:^(godsapp|sage|studio|shield|intel)$

# ── Center on screen (so they open in the middle, not top-left) ────────────
windowrulev2 = center,       class:^([Nn]yxus.*)$
windowrulev2 = center,       class:^(godsapp|sage|studio|shield|intel)$

# ── Popups STAY tile-suppressed but at their own designed size ─────────────
# nyxus-start (start menu), nyxus-panel (control panel), nyxus-notifications
# are decoration-less popup panels with hard-coded designed sizes — leave
# them alone, just float them so Hyprland doesn't tile-stretch them.
windowrulev2 = float,        class:^(nyxus-(start|panel|notifications))$
windowrulev2 = noborder,     class:^(nyxus-(start|panel|notifications))$
windowrulev2 = noshadow,     class:^(nyxus-(start|panel|notifications))$
