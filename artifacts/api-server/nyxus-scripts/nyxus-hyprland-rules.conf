# ============================================================
#  NYXUS — Hyprland window rules (DARK MIRROR rev 2026-05-07 r16)
#  ~/.config/hypr/conf.d/nyxus-hyprland-rules.conf
#
#  r10 · 2026-05-10 — Hyprland 0.54.3 ACTUAL reality (definitively
#                     proven by `hyprctl configerrors` round-trip):
#                       * `windowrulev2 = ...`  → DEPRECATED, errors
#                         out with "windowrulev2 is deprecated.
#                         Correct syntax can be found on the wiki."
#                       * `windowrule = RULE, class:REGEX [, title:..]`
#                         → THE canonical unified syntax. Works.
#                     The previous "invalid field float: missing a
#                     value" cascade was caused by malformed legacy
#                     content (block-style `windowrule { ... }`) in
#                     the original conf — NOT by the per-line v1
#                     syntax itself. Once that block was removed and
#                     everything reformatted to one-rule-per-line,
#                     v1 unified syntax parses cleanly. KEEP IT v1.
#                     DO NOT add `windowrulev2 =` ever — it's gone.
#
#  All 11 godsapp-family apps + the flyout (panel) + the catch-alls
#  float, center, and size to a consistent 900x650.
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

# -- NYXUS class apps (anything starting with "nyxus") --
windowrule = float,         class:^([Nn]yxus.*)$
windowrule = center,        class:^([Nn]yxus.*)$
windowrule = size 900 650,  class:^([Nn]yxus.*)$

# -- 11 godsapp-family product launchers (`home` excluded — desktop dashboard) --
windowrule = float,         class:^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather)$
windowrule = center,        class:^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather)$
windowrule = size 900 650,  class:^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather)$

# -- io.nyxus.* / org.nyxus.* / app.nyxus.* application IDs (GTK4 app_id) --
windowrule = float,         class:^((io|org|app)\.nyxus\..*)$
windowrule = center,        class:^((io|org|app)\.nyxus\..*)$
windowrule = size 900 650,  class:^((io|org|app)\.nyxus\..*)$

# -- The flyout (panel) — float, pin to right edge, fixed 460x680 --
windowrule = float,         class:^(panel|nyxus-panel)$
windowrule = pin,           class:^(panel|nyxus-panel)$
windowrule = size 460 680,  class:^(panel|nyxus-panel)$

# -- NYXUS Home (pinned to workspace 0 by main hyprland.conf; no overrides here) --

# ============================================================
#  PER-APP SIZE OVERRIDES (rev r8 · 2026-05-10)
#  Migrated out of main hyprland.conf where the unified
#  `windowrule =` form was misparsing `bordersize N` and
#  cascading 30+ "invalid field" errors on screen.
#  Using `windowrulev2 =` here — the legacy keyword that
#  parses cleanly on Hyprland 0.51-0.54.x.
#  These OVERRIDE the catch-all 900x650 above for apps
#  that need different dimensions.
# ============================================================

# -- NYXUS SysMon (1280x800, bordered) --
windowrule = size 1280 800,  class:^(io\.nyxus\.sysmon)$
windowrule = bordersize 1,   class:^(io\.nyxus\.sysmon)$

# -- NYXUS Control (1280x800, bordered) --
windowrule = size 1280 800,  class:^(io\.nyxus\.control)$
windowrule = bordersize 1,   class:^(io\.nyxus\.control)$

# -- NYXUS Notepad (compact 760x540) --
windowrule = size 760 540,   class:^(io\.nyxus\.notepad)$

# -- NYXUS Stickies (1280x800, bordered) --
windowrule = size 1280 800,  class:^(io\.nyxus\.stickies)$
windowrule = bordersize 1,   class:^(io\.nyxus\.stickies)$

# -- NYXUS Weather (380x560 widget, pinned top-left) --
windowrule = size 380 560,   class:^(io\.nyxus\.weather)$
windowrule = pin,            class:^(io\.nyxus\.weather)$
windowrule = move 20 100,    class:^(io\.nyxus\.weather)$

# -- NYXUS Terminal (1280x800, bordered) --
windowrule = size 1280 800,  class:^(io\.nyxus\.terminal)$
windowrule = bordersize 1,   class:^(io\.nyxus\.terminal)$

# -- NYXUS Settings (1280x800, bordered) --
windowrule = size 1280 800,  class:^(io\.nyxus\.settings)$
windowrule = bordersize 1,   class:^(io\.nyxus\.settings)$
