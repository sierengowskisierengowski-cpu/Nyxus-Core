# ============================================================
#  NYXUS — Hyprland window rules (DARK MIRROR rev 2026-05-14 r17)
#  ~/.config/hypr/conf.d/nyxus-hyprland-rules.conf
# ============================================================

# Floating-first desktop: default every mapped app window to floating.
# Tiling stays opt-in via the existing Super+Shift+T toggle.
windowrulev2 = float, class:^.+$

# NYXUS class catch-alls (both legacy and GTK app_id forms).
windowrulev2 = center, class:^[Nn]yxus.*$
windowrulev2 = size 960 680, class:^[Nn]yxus.*$
windowrulev2 = center, class:^((io|org|app)\.nyxus\..*)$
windowrulev2 = size 960 680, class:^((io|org|app)\.nyxus\..*)$

# godsapp-family product launchers (`home` excluded — desktop dashboard).
windowrulev2 = center, class:^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather)$
windowrulev2 = size 960 680, class:^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather)$

# Flyout panel.
windowrulev2 = pin, class:^(panel|nyxus-panel)$
windowrulev2 = size 460 680, class:^(panel|nyxus-panel)$

# NYXUS app sizing overrides (workflow-tuned defaults).
windowrulev2 = size 1280 800, class:^(((io|org|app)\.)?nyxus\.(sysmon|control|terminal|settings|security|wallpaperstudio))$
windowrulev2 = size 1240 820, class:^(((io|org|app)\.)?nyxus\.(store|files|updater))$
windowrulev2 = size 1040 720, class:^(((io|org|app)\.)?nyxus\.(backup|drop))$
windowrulev2 = size 980 700, class:^(((io|org|app)\.)?nyxus\.(screenshot|doctor))$
windowrulev2 = size 920 640, class:^(((io|org|app)\.)?nyxus\.(notepad|notes|clipboard))$
windowrulev2 = size 760 540, class:^(((io|org|app)\.)?nyxus\.(launcher|powermenu))$

# NYXUS Weather widget.
windowrulev2 = size 380 560, class:^(((io|org|app)\.)?nyxus\.weather)$
windowrulev2 = pin, class:^(((io|org|app)\.)?nyxus\.weather)$
windowrulev2 = move 20 100, class:^(((io|org|app)\.)?nyxus\.weather)$
