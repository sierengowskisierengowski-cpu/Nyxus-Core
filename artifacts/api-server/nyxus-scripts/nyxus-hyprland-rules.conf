# ── NYXUS class apps (anything starting with "nyxus") ──────────────────────
windowrule {
    name = nyxus-class-float
    match:class = ^([Nn]yxus.*)$
    float = true
}
windowrule {
    name = nyxus-class-size
    match:class = ^([Nn]yxus.*)$
    size = 900 650
}
windowrule {
    name = nyxus-class-center
    match:class = ^([Nn]yxus.*)$
    center = true
}

# ── godsapp-family launchers (named classes) ───────────────────────────────
windowrule {
    name = godsapp-float
    match:class = ^(godsapp|home|weather|notepad|passwords|intel|sage|studio|shield)$
    float = true
}
windowrule {
    name = godsapp-size
    match:class = ^(godsapp|home|weather|notepad|passwords|intel|sage|studio|shield)$
    size = 900 650
}
windowrule {
    name = godsapp-center
    match:class = ^(godsapp|home|weather|notepad|passwords|intel|sage|studio|shield)$
    center = true
}

# ── Popup panels (start/panel/notifications/etc.) ──────────────────────────
windowrule {
    name = nyxus-popups-float
    match:class = ^(nyxus-(start|panel|notifications|settings|quicksettings|powermenu))$
    float = true
}

# ── Screensaver + demon-wake overlays ──────────────────────────────────────
windowrule {
    name = nyxus-overlay-fullscreen
    match:class = ^(app\.nyxus\.(Screensaver|DemonWake))$
    fullscreen = true
}
windowrule {
    name = nyxus-overlay-noborder
    match:class = ^(app\.nyxus\.(Screensaver|DemonWake))$
    noborder = true
}
windowrule {
    name = nyxus-overlay-noanim
    match:class = ^(app\.nyxus\.(Screensaver|DemonWake))$
    noanim = true
}
windowrule {
    name = nyxus-screensaver-nofocus
    match:class = ^(app\.nyxus\.Screensaver)$
    nofocus = true
}
windowrule {
    name = nyxus-demonwake-pin
    match:class = ^(app\.nyxus\.DemonWake)$
    pin = true
}
windowrule {
    name = nyxus-demonwake-stayfocused
    match:class = ^(app\.nyxus\.DemonWake)$
    stayfocused = true
}
