# ============================================================
#  NYXUS — Hyprland window rules (DARK MIRROR rev 2026-05-07)
#  ~/.config/hypr/conf.d/nyxus-windowrules.conf
#
#  r5 · 2026.05.07 — All 11 godsapp-family apps + the flyout (panel)
#                    + the catch-alls float, center, and size to a
#                    consistent 900×650. Uniform behavior across the
#                    whole NYXUS app suite.
#
#  Hybrid syntax: block syntax for value-bearing rules (size, opacity);
#  windowrulev2 inline for valueless rules (float, center) which Hyprland
#  0.54.3 rejects inside blocks with "missing a value" errors.
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

# ── NYXUS class apps (anything starting with "nyxus") ──────────────────────
windowrule   = float, class:^([Nn]yxus.*)$
windowrule   = center, class:^([Nn]yxus.*)$

windowrule {
    name = nyxus-class-size
    match:class = ^([Nn]yxus.*)$
    size = 900 650
}

# ── 10 godsapp-family product launchers (named classes; `home` excluded) ──
# `home` is pinned to workspace 0 by main hyprland.conf as the desktop
# dashboard and must NOT be float/center/sized like a regular app window.
windowrule   = float,  class:^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather)$
windowrule   = center, class:^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather)$

windowrule {
    name = godsapp-family-size
    match:class = ^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather)$
    size = 900 650
}

# ── io.nyxus.* / org.nyxus.* application IDs (GTK4 app_id) ────────────────
# Repo ships both io.nyxus.* and org.nyxus.* — match either prefix.
windowrule   = float,  class:^((io|org)\.nyxus\..*)$
windowrule   = center, class:^((io|org)\.nyxus\..*)$

windowrule {
    name = ionyxus-size
    match:class = ^((io|org)\.nyxus\..*)$
    size = 900 650
}

# ── The flyout (panel) — dock to the right edge, fixed 460×680 ────────────
windowrule   = float,  class:^(panel|nyxus-panel)$
windowrule   = pin,    class:^(panel|nyxus-panel)$
windowrule {
    name = nyxus-panel-size
    match:class = ^(panel|nyxus-panel)$
    size = 460 680
}

# ── NYXUS Home (pinned to workspace 0, no float/size override) ─────────────
# Defined in main hyprland.conf at lines 23–32; do not duplicate here.
