kind = "web"
previewPath = "/nyxus-notepad/"
title = "NYXUS Notepad"
version = "1.0.0"
id = "artifacts/nyxus-notepad"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/nyxus-notepad/" ]
localPort = 23085

[services.development]
run = "pnpm --filter @workspace/nyxus-notepad run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nyxus-notepad", "run", "build" ]
publicDir = "artifacts/nyxus-notepad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23085"
BASE_PATH = "/nyxus-notepad/"
