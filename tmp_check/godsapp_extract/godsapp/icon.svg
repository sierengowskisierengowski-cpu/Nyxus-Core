<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%"  stop-color="#1a1828"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </radialGradient>
  </defs>

  <!-- background disk -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)"/>

  <!-- hand-drawn outer ring (3 wobbly passes) -->
  <g fill="none" stroke="#efefee" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 128 18 C 70 19 19 70 18 128 C 19 186 70 237 128 238 C 186 237 237 186 238 128 C 237 70 186 19 128 18 Z"
          stroke-width="2.6" opacity="0.92"/>
    <path d="M 130 21 C 72 21 21 73 22 130 C 23 188 73 234 128 235 C 187 236 234 184 235 127 C 233 70 184 19 130 21 Z"
          stroke-width="1.6" opacity="0.55"/>
    <path d="M 128 24 C 74 25 25 74 24 129 C 25 184 74 231 128 232 C 183 233 231 183 232 128 C 231 74 184 23 128 24 Z"
          stroke-width="1.0" opacity="0.30"/>
  </g>

  <!-- lavender accent dotted inner ring -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="#a89aca"
          stroke-width="1.4" opacity="0.42" stroke-dasharray="2 6"/>

  <!-- the big hand-drawn N -->
  <g fill="none" stroke="#efefee" stroke-linecap="round" stroke-linejoin="round">
    <!-- main strokes -->
    <path d="M 78 190 L 79 68" stroke-width="10" opacity="0.95"/>
    <path d="M 79 70 L 178 188" stroke-width="10" opacity="0.95"/>
    <path d="M 178 188 L 177 66" stroke-width="10" opacity="0.95"/>
    <!-- ghost layer (offset, lighter) -->
    <path d="M 81 188 L 82 71" stroke-width="6" opacity="0.35"/>
    <path d="M 82 73 L 180 186" stroke-width="6" opacity="0.35"/>
    <path d="M 180 186 L 179 69" stroke-width="6" opacity="0.35"/>
  </g>

  <!-- tiny brand tag -->
  <text x="128" y="226" text-anchor="middle"
        font-family="Caveat, 'Comic Sans MS', cursive" font-size="22"
        font-weight="700" fill="#efefee" opacity="0.78"
        letter-spacing="4">NYXUS</text>
</svg>
