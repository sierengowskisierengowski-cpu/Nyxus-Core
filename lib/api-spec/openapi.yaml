openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: nyxus-account
    description: NYXUS Account opt-in sync (binary tar.gz blobs; see route file)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /nyxus-account/status:
    get:
      operationId: nyxusAccountStatus
      tags: [nyxus-account]
      summary: NYXUS Account service liveness
      description: |
        Returns service descriptor for the NYXUS Account sync server.
        Used by Settings → NYXUS Account to confirm the configured
        endpoint is alive before pushing a bundle.
      responses:
        "200":
          description: Service descriptor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NyxusAccountStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    NyxusAccountStatus:
      type: object
      properties:
        service:
          type: string
        version:
          type: integer
        max_bundle_bytes:
          type: integer
      required:
        - service
        - version
        - max_bundle_bytes

